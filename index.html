<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoWarehouse 官網企劃 — AEO 優化完整版（四色標籤）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;display:flex;min-height:100vh;background:#f5f5f5;color:#333}
#sidebar{width:260px;background:#000;color:#eee;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:16px 0;z-index:10}
#sidebar h1{font-size:14px;padding:12px 16px;color:#bbb;border-bottom:1px solid #333}
.nav-item{display:block;padding:10px 20px;cursor:pointer;font-size:13px;transition:background .15s;border:none;background:none;color:#ccc;width:100%;text-align:left}
.nav-item:hover{background:#111;color:#fff}
.nav-item.active{background:#000;color:#fff;font-weight:bold}
.nav-child{padding-left:20px;display:none}
.nav-item.has-children.open+.nav-child{display:block}
.nav-child .nav-item{font-size:12px;padding:6px 16px}
#main{margin-left:260px;flex:1;padding:0}
#filter-bar{position:sticky;top:0;background:#fff;border-bottom:1px solid #ddd;padding:12px 24px;display:flex;gap:10px;align-items:center;z-index:5;flex-wrap:wrap}
#filter-bar button{padding:6px 14px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit}
#filter-bar button.active{background:#000;color:#fff;border-color:#000}
#filter-bar button.f-mod{border-color:#000}
#filter-bar button.f-enh{border-color:#f59e0b}
#filter-bar button.f-add{border-color:#dc2626}
#filter-bar button.f-mod.active{background:#000;border-color:#000}
#filter-bar button.f-enh.active{background:#f59e0b;border-color:#f59e0b}
#filter-bar button.f-add.active{background:#dc2626;border-color:#dc2626}
#stats{margin-left:auto;font-size:13px;color:#666}
#content{padding:24px;max-width:900px}
h2{font-size:22px;margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid #000}
h3{font-size:18px;margin:20px 0 8px;color:#000}
h4{font-size:15px;margin:16px 0 6px;color:#555}
p{margin:6px 0;line-height:1.8}
ul{margin:6px 0 12px 20px}
li{margin:4px 0;line-height:1.7}
table{width:100%;border-collapse:collapse;margin:12px 0}
th,td{border:1px solid #ccc;padding:8px 10px;font-size:13px;text-align:left}
th{background:#000;color:#fff}
tr:nth-child(even){background:#f9f9f9}

/* AEO 新增 — 紅色 */
.added{background:#fee2e2;border-left:4px solid #dc2626;padding:10px 14px;margin:12px 0;border-radius:4px}
.a-label{font-size:12px;font-weight:bold;color:#dc2626;margin-bottom:4px}

/* AEO 強化 — 橘黃色 */
.enhanced{background:#fef3c7;border-left:4px solid #f59e0b;padding:10px 14px;margin:12px 0;border-radius:4px}
.e-label{font-size:12px;font-weight:bold;color:#b45309;margin-bottom:4px}

/* 文案修改 — 藍色（區塊級） */
.modblock{background:#f0f0f0;border-left:4px solid #000;padding:10px 14px;margin:12px 0;border-radius:4px}
.m-label{font-size:12px;font-weight:bold;color:#000;margin-bottom:4px}

/* 文案修改（行內） — 藍色底 */
.modified{background:#f0f0f0;border-radius:3px;padding:1px 4px;color:#000}
tr.modified td{background:#f0f0f0}

/* 原版 Q&A */
.orig-qa{background:#f3f4f6;border-left:4px solid #6b7280;padding:10px 14px;margin:12px 0;border-radius:4px}

/* 圖例 */
.legend-row{display:flex;gap:12px;align-items:flex-start;margin:12px 0}
.legend-chip{display:inline-block;padding:4px 12px;border-radius:4px;font-weight:bold;font-size:13px;flex-shrink:0;min-width:100px;text-align:center}
.legend-orig{background:#f3f4f6;color:#374151;border:1px solid #9ca3af}
.legend-mod{background:#f0f0f0;color:#000}
.legend-enh{background:#fef3c7;color:#b45309}
.legend-add{background:#fee2e2;color:#dc2626}
.legend-desc{color:#444;line-height:1.7}

/* FAQ */
.faq{margin:8px 0;padding:8px 0;border-bottom:1px solid #d0d8f0}
.faq-q{font-weight:bold;color:#000}
.faq-a{color:#333}
.toggle{cursor:pointer;user-select:none;color:#000}
.toggle:hover{text-decoration:underline}
.collapsible{display:none;margin-top:6px}
.collapsible.open{display:block}
.feat-link{color:#000;text-decoration:underline;cursor:pointer}
.feat-link:hover{color:#dc2626}

/* 視覺卡片 */
.stat-card{flex:1;min-width:140px;background:#f0f4ff;border-radius:8px;padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:bold;color:#000}
.stat-label{font-size:13px;color:#555;margin-top:4px}
.ind-card{flex:1;min-width:150px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:box-shadow .2s}
.ind-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.story-card{padding:10px 14px;background:#fff;border-left:3px solid #000;border-radius:4px}
.story-block{background:#fafafa;border:1px solid #d4d4d4;border-left:4px solid #000;border-radius:6px;padding:14px 18px;margin:16px 0}
.story-block h4{margin:0 0 6px;color:#000;font-size:15px}
.trust-card{flex:1;min-width:180px;padding:12px;background:#f8f8f8;border-radius:6px;text-align:center;font-size:14px;font-weight:bold}
.cta-block{background:#000;color:#fff;border-radius:8px;padding:24px;text-align:center;margin:16px 0}
.cta-btn-primary{background:#fff;color:#000;padding:10px 24px;border-radius:6px;font-weight:bold;font-size:15px;display:inline-block}
.cta-btn-outline{background:transparent;color:#fff;padding:10px 24px;border-radius:6px;font-weight:bold;font-size:15px;border:2px solid #fff;display:inline-block}

/* 篩選器隱藏規則 */
body.filter-mod .added,body.filter-mod .enhanced{display:none}
body.filter-mod .orig-qa{opacity:.3}
body.filter-enh .added,body.filter-enh .modblock{display:none}
body.filter-enh .modified{opacity:.3}
body.filter-enh .orig-qa{opacity:.3}
body.filter-add .enhanced,body.filter-add .modblock{display:none}
body.filter-add .modified{opacity:.3}
body.filter-add .orig-qa{opacity:.3}

em{color:#888;font-size:13px}

/* 首頁 v2 專用樣式 */
.layout-note{background:#fffbeb;border-left:3px solid #f59e0b;padding:8px 12px;font-size:12px;color:#92400e;margin:8px 0 24px 0;border-radius:4px;font-style:italic}
.flow-node{background:#fff;border:1px solid #d4d4d4;border-radius:8px;padding:14px;text-align:center;font-size:14px;transition:all .2s;cursor:pointer}
.flow-node:hover{box-shadow:0 4px 12px rgba(0,0,0,.15);transform:translateY(-2px)}
/* 大流程卡內嵌功能 */
.flow-big-card{background:#fff;border:1px solid #e3e3e3;border-radius:12px;padding:16px}
.flow-big-header{display:flex;align-items:center;gap:8px;font-size:15px;color:#000;margin-bottom:4px}
.flow-num{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;background:#000;color:#fff;border-radius:50%;font-size:13px;font-weight:bold}
.flow-desc{font-size:12px;color:#666;margin:4px 0 12px 0;line-height:1.5}
.flow-modules-label{font-size:10px;color:#888;letter-spacing:1px;margin:0 0 6px 0;font-weight:600}
.flow-modules{display:flex;flex-direction:column;gap:6px}
.flow-feat{background:#fafafa;border:1px solid #eaeaea;border-radius:6px;padding:8px 10px;cursor:pointer;transition:all .15s}
.flow-feat:hover{border-color:#000;background:#f5f5f5}
.flow-feat strong{display:block;font-size:12px;color:#000;margin-bottom:2px}
.flow-feat span{font-size:11px;color:#666;line-height:1.4}
.flow-feat::after{content:" →";font-size:11px;color:#000;font-weight:600;margin-left:6px}
.flow-feat-static{background:#f5f5f5;border:1px solid #e5e5e5;border-radius:6px;padding:8px 10px}
.flow-feat-static strong{display:block;font-size:12px;color:#333;margin-bottom:2px}
.flow-feat-static span{font-size:11px;color:#666;line-height:1.4}
.flow-cross-card{background:#fff;border:1px solid #e3e3e3;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.flow-cross-card:hover{border-color:#000;box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}
.flow-cross-card strong{display:block;font-size:15px;color:#000;margin-bottom:4px}
.flow-cross-card p{font-size:12px;color:#555;margin:0;line-height:1.6}
.flow-cross-card::after{content:"查看詳情 →";display:block;font-size:11px;color:#000;font-weight:600;margin-top:8px}
.tag-chip{background:#f0f0f0;color:#000;padding:3px 10px;border-radius:12px;font-size:11px;border:1px solid #d4d4d4}
.integ-chip{background:#fff;border:1px solid #e3e3e3;padding:7px 14px;border-radius:6px;font-size:13px;color:#444;transition:all .15s}
.integ-chip:hover{border-color:#000;color:#000}
.logo-placeholder{background:#fff;border:1px dashed #d1d5db;border-radius:4px;padding:6px 4px;font-size:10px;color:#9ca3af;text-align:center;aspect-ratio:3/2;display:flex;align-items:center;justify-content:center}
/* 訂閱方案表格 */
.pricing-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.pricing-table th{background:#000;color:#fff;padding:10px;text-align:center;font-weight:600}
.pricing-table th:first-child{text-align:left}
.pricing-table td{border:1px solid #e5e5e5;padding:8px 10px;text-align:center}
.pricing-table td:first-child{text-align:left;background:#fafafa}
.pricing-table tr:nth-child(even) td{background:#fafafa}
.pricing-table tr:nth-child(even) td:first-child{background:#f5f5f5}
.pricing-table td.y{color:#16a34a;font-size:16px;font-weight:bold}
.pricing-table td.n{color:#dc2626;font-size:16px;font-weight:bold}
.pricing-table tr.modified td{background:#fee2e2}
.pricing-table tr.modified td:first-child{background:#fecaca}
.feat-compare tr:hover td{background:#f0f0f0}
.feat-compare tr:hover td:first-child{background:#e8e8e8}
/* 15 項功能詳情頁統一排版 */
.feat-hero{background:linear-gradient(135deg,#000 0%,#1a1a1a 100%);color:#fff;padding:40px 36px;border-radius:12px;margin:0 0 24px 0}
.feat-page-tag{font-size:11px;color:#999;letter-spacing:3px;margin:0 0 10px 0}
.feat-page-title{font-size:26px;color:#fff;margin:0 0 14px 0;font-weight:700;border:none;padding:0}
.feat-page-sub{font-size:15px;color:#ddd;line-height:1.8;max-width:760px}
.feat-section{margin:0 0 28px 0}
.feat-section-title{font-size:18px;color:#000;margin:0 0 14px 0;padding:0 0 6px 0;border-bottom:3px solid #000;display:inline-block}
/* 產業痛點 */
.feat-pain{background:#fff5f5;padding:20px 24px;border-radius:8px}
.feat-pain .feat-section-title{border-bottom:3px solid #dc2626;color:#991b1b}
.feat-pain-list{margin:0 0 0 20px;padding:0;color:#555;line-height:1.9;font-size:14px}
/* 核心亮點 */
.feat-highlight-list{display:flex;flex-direction:column;gap:10px}
.feat-highlight-card{background:#fff;border:1px solid #e3e3e3;border-radius:8px;padding:16px 20px}
.feat-highlight-title{margin:0 0 8px 0;font-size:15px;color:#000;font-weight:600}
.feat-highlight-body{margin:2px 0;color:#555;line-height:1.8;font-size:13px}
.feat-highlight-body-sub{margin:2px 0 2px 16px;color:#666;font-size:12px;line-height:1.7}
/* 更多功能 */
.feat-more{background:#f9f9f9;border-radius:12px;padding:20px 24px}
.feat-more .feat-section-title{border-bottom:3px solid #555}
.feat-more-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.feat-more-card{background:#fff;border:1px solid #e3e3e3;border-radius:6px;padding:12px 14px;font-size:13px;color:#333;line-height:1.6;transition:all .15s}
.feat-more-card:hover{border-color:#000;background:#fafafa;cursor:pointer}
/* CTA */
.feat-cta{background:linear-gradient(135deg,#000 0%,#1a1a1a 100%);color:#fff;padding:40px;border-radius:12px;text-align:center;margin-top:32px}
.feat-cta-text{font-size:18px;color:#fff;margin:0 0 18px 0;font-weight:600}
.feat-cta-btn{display:inline-block;background:#fff;color:#000;padding:12px 32px;border-radius:6px;font-weight:bold;text-decoration:none;font-size:15px;transition:background .15s}
.feat-cta-btn:hover{background:#f0f0f0}
/* 產業頁量化價值區塊 */
.ind-stat-block{background:linear-gradient(135deg,#000 0%,#1a1a1a 100%);color:#fff;padding:28px 32px;border-radius:12px;margin:0 0 28px 0}
.ind-stat-label{font-size:11px;color:#999;letter-spacing:3px;margin:0 0 8px 0}
.ind-stat-value{font-size:19px;color:#fff;margin:0;line-height:1.6;font-weight:600}
/* 產業頁 Q&A */
.ind-qa-list{display:flex;flex-direction:column;gap:12px}
.ind-qa-item{background:#fafafa;border-left:3px solid #000;border-radius:6px;padding:14px 18px}
.ind-qa-q{font-size:14px;font-weight:600;color:#000;margin:0 0 6px 0;line-height:1.6}
.ind-qa-a{font-size:13px;color:#555;margin:0;line-height:1.8}
/* 產業頁核心技術亮點 3 欄卡片 */
.ind-tech-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ind-tech-card{background:#fff;border:1px solid #e3e3e3;border-radius:12px;padding:20px 18px;transition:all .2s;display:flex;flex-direction:column}
.ind-tech-card:hover{border-color:#000;box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}
.ind-tech-num{font-size:11px;color:#999;letter-spacing:3px;margin:0 0 10px 0;font-weight:700}
.ind-tech-title{margin:0 0 10px 0;font-size:17px;color:#000;font-weight:700;line-height:1.5}
.ind-tech-body{margin:0;font-size:15px;color:#333;line-height:1.8}
/* 核心架構圓餅圖 modal */
.arch-tooltip{display:none;position:absolute;background:#000;color:#fff;padding:10px 14px;border-radius:6px;font-size:13px;max-width:280px;z-index:100;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.arch-tooltip strong{display:block;font-size:14px;margin-bottom:4px;color:#fff}
.arch-tooltip ul{margin:0;padding-left:18px;color:#ccc;font-size:12px;line-height:1.8}
.arch-tooltip ul li{margin:2px 0}
.arch-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
.arch-modal-content{background:#fff;border-radius:10px;padding:32px 36px;max-width:760px;width:92%;max-height:84vh;overflow:auto;position:relative;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.arch-modal-close{position:absolute;top:14px;right:18px;background:none;border:none;font-size:28px;color:#666;cursor:pointer;line-height:1;padding:4px 10px;border-radius:4px}
.arch-modal-close:hover{background:#f0f0f0;color:#000}
.arch-modal h3{margin:0 0 8px 0;font-size:22px;color:#000;border:none;padding:0}
.arch-modal-desc{color:#666;font-size:14px;margin:0 0 18px 0;line-height:1.8}
/* 四大方案頁：營運痛點 2x2 卡片 grid */
.plan-card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
/* 四大方案頁：解決方案內文放大（重點內容） */
.plan-sol-list .feat-highlight-card{padding:20px 24px}
.plan-sol-list .feat-highlight-title{font-size:17px;margin:0 0 10px 0}
.plan-sol-list .feat-highlight-body{font-size:15px;color:#333;line-height:1.9}

/* 四大方案頁實戰故事 — 雜誌 / Case Study 風格 */
.plan-story-body{background:#fdf8ec;border:1px solid #e8dcc2;border-radius:8px;padding:40px 48px;color:#2a2416;line-height:2;font-size:15px;font-family:'Noto Serif TC','PingFang TC',serif;position:relative;box-shadow:inset 0 0 0 1px #fff,0 2px 8px rgba(0,0,0,.04)}
.plan-story-body::before{content:'CASE STUDY';display:block;font-size:11px;letter-spacing:5px;color:#a88b50;margin-bottom:8px;font-family:'Helvetica Neue',sans-serif;font-weight:600}
.plan-story-body::after{content:'';display:block;width:40px;height:2px;background:#a88b50;margin:0 0 24px 0}
.plan-story-body p{margin:0 0 18px 0;text-indent:2em}
.plan-story-body p:first-of-type{text-indent:0}
.plan-story-body p:first-of-type::first-letter{font-size:52px;font-weight:bold;float:left;line-height:1;margin:6px 10px 0 0;color:#000;font-family:'Noto Serif TC',serif}
.plan-story-body p:last-child{margin-bottom:0}
.plan-story-body a{color:#000;border-bottom:1px solid #a88b50;text-decoration:none}
.plan-story-body a:hover{color:#a88b50}
/* 最新動態頁 */
.news-filter{padding:6px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;margin-right:8px;font-family:inherit;color:#666}
.news-filter.active{background:#000;color:#fff;border-color:#000}
.news-card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:20px}
/* 15 項功能亮點 carousel */
.feat-carousel-wrap{position:relative;margin:16px 0}
.feat-carousel{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;padding:6px 40px 16px 40px;-webkit-overflow-scrolling:touch}
.feat-carousel::-webkit-scrollbar{height:8px}
.feat-carousel::-webkit-scrollbar-track{background:#f5f5f5;border-radius:4px}
.feat-carousel::-webkit-scrollbar-thumb{background:#bbb;border-radius:4px}
.feat-carousel::-webkit-scrollbar-thumb:hover{background:#888}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #ddd;color:#000;font-size:22px;line-height:1;cursor:pointer;z-index:3;box-shadow:0 2px 6px rgba(0,0,0,.08);font-family:inherit;display:flex;align-items:center;justify-content:center}
.carousel-btn:hover{background:#000;color:#fff;border-color:#000}
.carousel-prev{left:0}
.carousel-next{right:0}
/* 15 項功能亮點卡片 */
.feat-tile{flex:0 0 220px;scroll-snap-align:start;background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:14px;transition:all .2s;cursor:pointer}
.feat-tile:hover{border-color:#000;box-shadow:0 4px 12px rgba(0,0,0,.12);transform:translateY(-2px)}
.feat-tile h4{margin:0 0 6px 0;font-size:14px;color:#000;font-weight:700}
.feat-tile p{margin:0;font-size:12px;color:#555;line-height:1.6}
.feat-tile::after{content:"查看功能 →";display:block;margin-top:10px;font-size:11px;color:#000;font-weight:600;opacity:.7}
.feat-tile:hover::after{opacity:1}
.click-card{transition:all .2s}
.click-card:hover{border-color:#000!important;box-shadow:0 4px 12px rgba(0,0,0,.12);transform:translateY(-2px)}
.click-card::after{content:"查看詳情 →";display:block;margin-top:10px;font-size:11px;color:#000;font-weight:600;opacity:.7}
.click-card:hover::after{opacity:1}
.story-card[onclick]{transition:all .2s}
.story-card[onclick]:hover{box-shadow:0 4px 12px rgba(0,0,0,.12);transform:translateY(-2px)}
.story-card[onclick]::after{content:"查看客戶故事 →";display:block;margin-top:10px;font-size:11px;color:#000;font-weight:600;opacity:.7}
.story-card[onclick]:hover::after{opacity:1}
/* v2 客戶成效卡片（白底圓角，黑數字大字） */
.stat-card-v2{background:#fff;border-radius:16px;padding:32px 24px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-num-v2{font-size:44px;font-weight:800;color:#000;letter-spacing:-1px;line-height:1.1}
.stat-label-v2{font-size:14px;color:#8b8fa3;margin-top:12px;font-weight:500}

@media(max-width:768px){#sidebar{width:200px}#main{margin-left:200px}}
</style>
</head>
<body>
<div id="sidebar">
<h1>GoWarehouse AEO 優化版</h1>
<div id="nav"></div>
<a href="https://github.com/mickeyhuang-sketch/web-mockup-2026/blob/main/venta-ui-engineer-checklist.md" target="_blank" rel="noopener" style="display:block;margin:24px 16px 16px 16px;padding:12px 14px;background:#b8860b;color:#fff;text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;text-align:center;transition:background .15s">📋 AEO 技術規格書 →</a>
</div>
<div id="main">
<div id="filter-bar">
<button class="active" onclick="setFilter('all')">全部顯示</button>
<button class="f-mod" onclick="setFilter('mod')"> 只看文案修改</button>
<button class="f-enh" onclick="setFilter('enh')"> 只看 AEO 強化</button>
<button class="f-add" onclick="setFilter('add')"> 只看 AEO 新增</button>
<span id="stats"></span>

<script>
const DATA=[{"id": "home", "title": "首頁（檢視 AEO 推薦成果）", "html": "\n<h2>首頁規劃</h2>\n<p><strong>核心標語：「以國際標準 SOP，建構企業的數位倉儲基石」</strong>（原版保留）</p>\n\n<div class=\"added\"><p class=\"a-label\">AEO 新增：定義段落（開頭）</p><p>GoWarehouse 是台灣本土開發的雲端倉儲管理系統（WMS），由 IBIZA 伊比薩資訊團隊打造。系統涵蓋入庫、儲位、揀貨、品檢、出貨、退貨全流程數位化管理，支援食品生技、服飾鞋包、3C 電子、生活日用、零售連鎖等五大產業，目前服務超過 50 家企業倉庫。透過手機 APP 取代傳統 PDA，搭配 AI 智慧助理 Vanta × Claude，實現低成本、高效率的半自動化倉儲管理。</p></div>\n\n<div class=\"added\"><p class=\"a-label\">AEO 新增：量化成果數字區（數字來自原版各產業頁彙整）</p><div style=\"display:flex;flex-wrap:wrap;gap:16px;margin:16px 0\"><div class=\"stat-card\"><div class=\"stat-num\">200-300%</div><div class=\"stat-label\">出貨速度提升</div></div><div class=\"stat-card\"><div class=\"stat-num\">0.01%</div><div class=\"stat-label\">出貨錯誤率</div></div><div class=\"stat-card\"><div class=\"stat-num\">2 天</div><div class=\"stat-label\">新人即可上手</div></div><div class=\"stat-card\"><div class=\"stat-num\">85%</div><div class=\"stat-label\">過期報廢率降低</div></div><div class=\"stat-card\"><div class=\"stat-num\">50+</div><div class=\"stat-label\">企業合作夥伴</div></div></div></div>\n\n<h3>第一區塊：Hero Banner（原版保留，3 BN 輪播）</h3>\n<ul>\n<li><strong>BN 1：</strong>品牌形象頁 — 大標：以國際標準 SOP，建構企業的數位倉儲基石</li>\n<li><strong>BN 2：</strong>實體說明會（兩個月換一次）</li>\n<li><strong>BN 3：</strong>季度合作頁（兩個月換一次）</li>\n</ul>\n\n<h3>第二區塊：產品亮點（原版保留 8 大亮點）</h3>\n<ul>\n<li><a href=\"#\" onclick=\"showSection('feat-14');return false\" class=\"feat-link\">Vanta × Claude AI 智慧助理</a>提供 24/7 倉務支援（<span class=\"modified\">原「GoBot AI 智慧導航員」改名</span>）</li>\n<li>內建國際標準化 SOP 與多語系支援</li>\n<li><a href=\"#\" onclick=\"showSection('feat-1');return false\" class=\"feat-link\">全通路訂單自動化</a>：完美整合多個電商平台與官網，實現訂單自動匯流，<span class=\"modified\">即時庫存同步（可主動觸發同步按鈕）</span>至各平台，讓您在大促爆單時依然氣定神閒（<span class=\"modified\">原「入庫即時推送各平台庫存」改寫</span>）</li>\n<li><a href=\"#\" onclick=\"showSection('feat-3');return false\" class=\"feat-link\">多層彈性點收</a>機制</li>\n<li><a href=\"#\" onclick=\"showSection('feat-4');return false\" class=\"feat-link\">智慧儲位管理</a>與揀貨優化</li>\n<li>即時庫存預警與追蹤</li>\n<li><a href=\"#\" onclick=\"showSection('feat-2');return false\" class=\"feat-link\">手機 APP</a> 取代傳統 PDA</li>\n<li>雲端訂閱制輕鬆導入</li>\n</ul>\n\n<h3>第三區塊：解決方案分流（原版保留）</h3>\n<ul>\n<li><strong>品牌成長方案：</strong>適合 2C 電商初創品牌</li>\n<li><strong>企業全通路方案：</strong>整合 2B/2C 混合需求</li>\n<li><strong>專業三方倉方案：</strong>多貨主與自動化計費</li>\n<li><strong>零售連鎖方案：</strong>多節點門市補貨管理</li>\n</ul>\n\n<h3>第四區塊：產業應用與夥伴生態（原版保留）</h3>\n<p><em>原版第四區塊本來就有「產業專區導覽」列五大產業與說明文字。以下為速覽卡片化呈現（呈現形式參考，內容與原版一致）</em></p>\n<div style=\"display:flex;flex-wrap:wrap;gap:12px;margin:16px 0\">\n<div class=\"ind-card\" onclick=\"showSection('ind-food')\"><div style=\"font-size:24px\"></div><div style=\"font-weight:bold;margin:6px 0\">食品生技</div><div style=\"font-size:12px;color:#666\">FEFO 效期管理<br/>通路允收控管</div></div>\n<div class=\"ind-card\" onclick=\"showSection('ind-fashion')\"><div style=\"font-size:24px\"></div><div style=\"font-weight:bold;margin:6px 0\">服飾鞋包</div><div style=\"font-size:12px;color:#666\">SKU 矩陣管理<br/>防超賣機制</div></div>\n<div class=\"ind-card\" onclick=\"showSection('ind-daily')\"><div style=\"font-size:24px\"></div><div style=\"font-weight:bold;margin:6px 0\">生活日用</div><div style=\"font-size:12px;color:#666\">波次揀貨優化<br/>爆單應對</div></div>\n<div class=\"ind-card\" onclick=\"showSection('ind-3c')\"><div style=\"font-size:24px\"></div><div style=\"font-weight:bold;margin:6px 0\">3C 電子</div><div style=\"font-size:12px;color:#666\">一機一號追蹤<br/>QC 雲端錄影</div></div>\n<div class=\"ind-card\" onclick=\"showSection('ind-retail')\"><div style=\"font-size:24px\"></div><div style=\"font-weight:bold;margin:6px 0\">零售連鎖</div><div style=\"font-size:12px;color:#666\">門市分倉管理<br/>自動補貨</div></div>\n</div>\n<p><strong>【合作串接平台】</strong>（原版保留）Logo 牆：Shopify、Shopee、MOMO 等電商平台、物流快遞與金流業者</p>\n<p><strong>【專業倉庫夥伴】</strong>（原版保留）合作倉庫 Logo，手機版橫向滑動，點擊浮現所在地、特色簡介與作業規範</p>\n\n<div class=\"added\"><p class=\"a-label\">AEO 新增：客戶實戰故事摘要（故事內容來自原版各方案頁，呈現形式為首頁新增）</p><div style=\"background:#fafafa;border:1px solid #eee;border-radius:8px;padding:16px;margin:16px 0\"><h4 style=\"margin-top:0\">客戶怎麼說</h4><div style=\"display:flex;flex-direction:column;gap:12px\"><div class=\"story-card\"><p style=\"margin:0\"><strong>品牌 U(2C 電商)</strong>：透過自營倉庫結合 GoWarehouse，在掌握物流自主性的同時享有頂尖技術支援，出貨錯誤率從 3% 降至趨近於零。</p></div><div class=\"story-card\"><p style=\"margin:0\"><strong>食品大廠 S(企業全通路)</strong>：透過多層彈性點收與批號效期管理，解決 O2O 混合經營的通路複雜度，過期報廢率降低 85%。</p></div><div class=\"story-card\"><p style=\"margin:0\"><strong>物流公司 N(三方倉)</strong>：透過標準化流程與自動化帳務，建立與貨主的深厚信賴，新人 2 天上手，擴張不犧牲品質。</p></div></div></div></div>\n\n<h3>第五區塊：安全合規（原版保留 ISO 27001）+ AEO 強化</h3>\n<p><strong>【ISO 27001 國際認證】</strong>（原版）GoWarehouse AI 全面通過 ISO 27001 國際資訊安全管理系統認證。我們以最高的資安標準保護您的營運數據，在標準化作業基礎上，提供最穩定的雲端防護。</p>\n\n<div class=\"enhanced\"><p class=\"e-label\">AEO 強化：補充技術信任卡片（原版只提 ISO 27001，AEO 加入 GCP 與加密細節）</p><div style=\"display:flex;flex-wrap:wrap;gap:16px;margin:16px 0\"><div class=\"trust-card\"> ISO/IEC 27001:2022<br/><span style=\"font-size:12px;color:#666\">資訊安全管理認證<br/>（原版已有）</span></div><div class=\"trust-card\"> Google Cloud Platform<br/><span style=\"font-size:12px;color:#666\">企業級雲端託管<br/>（AEO 新增補充）</span></div><div class=\"trust-card\"> AES-256 + HTTPS<br/><span style=\"font-size:12px;color:#666\">資料全程加密傳輸<br/>（AEO 新增補充）</span></div></div></div>\n\n<h3>第六區塊：最終行動呼籲（原版保留）+ 文案微調</h3>\n<p><strong>（原版）</strong>準備好優化您的倉儲效率了嗎？無論是初期創業或規模化企業，GoWarehouse AI 皆能提供符合您現階段需求的標準化配置。即刻開啟數位轉型，建立精準、高效且具備彈性的物流體系。</p>\n\n<div class=\"modblock\"><p class=\"m-label\">文案修改：CTA 區塊改寫（更直白 + 加入 LINE OA 諮詢按鈕）</p><div class=\"cta-block\"><p style=\"font-size:18px;font-weight:bold;margin-bottom:8px\">準備好讓倉庫數位化了嗎？</p><p style=\"font-size:14px;margin-bottom:16px;color:#ccc\">7 天免費試用，不需信用卡，不需額外硬體</p><div style=\"display:flex;justify-content:center;gap:16px;flex-wrap:wrap\"><div class=\"cta-btn-primary\">前往試用</div><div class=\"cta-btn-outline\" onclick=\"window.open('https://line.me/R/ti/p/@gowarehouse','_blank')\" style=\"cursor:pointer\">LINE OA 諮詢</div></div></div></div>\n\n<div class=\"added\"><p class=\"a-label\">AEO 新增：FAQ 區塊</p><h4>常見問題 (FAQ)</h4><div><div class=\"faq\"><p class=\"faq-q\">Q：WMS 系統是什麼？跟 ERP 有什麼不同？</p><p class=\"faq-a\">A：WMS（Warehouse Management System）是專門管理倉庫實務作業的系統，包括收貨、上架、揀貨、品檢、出貨等流程。ERP 偏重帳務與資源規劃，WMS 則聚焦倉庫現場的執行效率。兩者互補，企業通常同時使用。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：GoWarehouse 適合什麼規模的公司？</p><p class=\"faq-a\">A：GoWarehouse 提供標準版（每天只要 NT$219）到企業版（專案議價）三種方案，從日出貨數十件的初創品牌，到月出貨量超過 30 萬件的大型三方倉都適用。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：導入 WMS 需要多久時間？</p><p class=\"faq-a\">A：標準版最快當天開通即可開始使用。專業版與企業版含客製設定與教育訓練，通常 2-4 週完成導入。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：GoWarehouse 支援哪些電商平台串接？</p><p class=\"faq-a\">A：目前支援 Shopee、Momo、Coupang、ShopLine、LiteShop、MoPlus 等平台自動拉單，非串接平台可透過 Excel 批次匯入或手動建單。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：沒有技術團隊也能使用嗎？</p><p class=\"faq-a\">A：可以。GoWarehouse 採用手機 APP 操作，不需要額外購買 PDA 或架設硬體設備。系統內建 AI 助理 Vanta × Claude，操作上有問題可以隨時詢問。</p></div></div></div>\n", "children": []}, {"id": "home-v2", "title": "首頁（修正重構版以此為準）", "html": "\n\n<div style=\"background:linear-gradient(135deg,#000 0%,#000 100%);color:#fff;padding:48px 40px;border-radius:12px;margin:0 0 24px 0\">\n<div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:28px;align-items:center\">\n<div>\n<p style=\"font-size:12px;color:#bbb;letter-spacing:2px;margin-bottom:12px\">CLOUD WAREHOUSE MANAGEMENT SYSTEM</p>\n<h1 style=\"font-size:30px;line-height:1.35;margin:0 0 14px 0;color:#fff;font-weight:700\">從起步電商到專業三方倉，<br/>一套 WMS 全適用</h1>\n<p style=\"font-size:14px;line-height:1.75;color:#cfd4dc;margin:0 0 20px 0\">GoWarehouse 是符合國際倉儲業 SOP 標準的雲端倉儲管理系統。從日出貨 30 件的初創品牌到月出貨 30 萬件的專業三方倉都適用，手機 APP 取代傳統 PDA、內建 AI 助理隨問隨答、支援多國語系（含繁中、簡中、英文、日文及東南亞語系），50+ 企業倉庫已在使用。</p>\n<div style=\"display:flex;gap:12px\">\n<div class=\"cta-btn-primary\">前往試用</div>\n<div class=\"cta-btn-outline\" onclick=\"showSection('news')\" style=\"cursor:pointer\">查看近期活動</div>\n</div>\n</div>\n<div style=\"background:rgba(255,255,255, 理</strong></div>\n<p class=\"flow-desc\">從到貨驗收到上架歸位，標準化每一個入庫環節</p>\n<div class=\"flow-modules\">\n<div class=\"flow-feat\" onclick=\"showSection('feat-3')\"><strong>多層彈性點收</strong><span>板、箱、件三層單位自動換算</span></div>\n<div class=\"flow-feat\" onclick=\"showSection('feat-5')\"><strong>批號效期管理</strong><span>FEFO 自動分配、通路別允收</span></div>\n</div>\n</div>\n\n<div class=\"flow-big-card\">\n<div class=\"flow-big-header\"><strong>加工管理</strong></div>\n<p class=\"flow-desc\">原物料到成品的轉化站：倉內加工、組裝與改包作業</p>\n<div class=\"flow-modules\">\n<div class=\"flow-feat-static\"><strong>BOM 物料清單</strong><span>預先定義商品 BOM，配料自動鎖定</span></div>\n<div class=\"flow-feat-static\"><strong>加工單管理</strong><span>完整狀態流程，成品自動入庫</span></div>\n</div>\n</div>\n\n<div class=\"flow-big-card\">\n<div class=\"flow-big-header\"><strong>庫存管理</strong></div>\n<p class=\"flow-desc\">即時掌握庫存水位、效期與異動，四類預警監控</p>\n<div class=\"flow-modules\">\n<div class=\"flow-feat\" onclick=\"showSection('feat-12')\"><strong>安全庫存與判定補貨</strong><span>健康度紅黃綠預警，自動補貨</span></div>\n<div class=\"flow-feat\" onclick=\"showSection('feat-11')\"><strong>耗材管理</strong><span>包材綁定、成本精算到每一箱</span></div>\n</div>\n</div>\n\n<div class=\"flow-big-card\">\n<div class=\"flow-big-header\"><strong>智慧儲位</strong></div>\n<p class=\"flow-desc\">從儲位規劃到上架引導，系統全程指引最佳存放策略</p>\n<div class=\"flow-modules\">\n<div class=\"flow-feat\" onclick=\"showSection('feat-4')\"><strong>智慧儲位管理</strong><span>三種模式 × 五溫層分區，智慧推薦 Top 5</span></div>\n<div class=\"flow-feat\" onclick=\"showSection('feat-10')\"><strong>盤點功能</strong><span>明/盲 × 動/靜四種模式</span></div>\n</div>\n</div>\n\n<div class=\"flow-big-card\">\n<div class=\"flow-big-header\"><strong>訂單管理</strong></div>\n<p class=\"flow-desc\">出貨指令起點，從多平台訂單匯入到智慧分派一站搞定</p>\n<div class=\"flow-modules\">\n<div class=\"flow-feat\" onclick=\"showSection('feat-1')\"><strong>全通路訂單自動化</strong><span>主流電商即時拉單、兩階段防超賣</span></div>\n<div class=\"flow-feat\" onclick=\"showSection('feat-15')\"><strong>開放整合平台</strong><span>Webhook + OAuth 2.0 API、ERP / POS 串接< arehouse','_blank')\" style=\"cursor:pointer\">LINE OA 諮詢</div>\n<div class=\"cta-btn-outline\" onclick=\"showSection('news')\" style=\"cursor:pointer\">參加說明會</div>\n</div>\n</div>\n\n", "children": []}, {"id": "solutions", "title": "解決方案", "html": "\n<div class=\"feat-hero\">\n<p class=\"feat-page-tag\">SOLUTIONS</p>\n<h3 class=\"feat-page-title\">懂您的商業模式，更懂您的物流實務</h3>\n<p class=\"feat-page-sub\" style=\"margin:0 0 14px 0\">GoWarehouse 不僅是工具，更是針對不同營運型態設計的數位大腦。從品牌初創到跨國連鎖，我們協助您建立最符合現況的標準化管理流程。</p>\n</div>\n\n<div class=\"enhanced\"><p class=\"e-label\">AEO 強化：補結構化定義段落</p><p style=\"line-height:1.9;color:#333;margin:0\">GoWarehouse 針對不同企業規模與產業需求，提供品牌成長、企業全通路、專業三方倉、零售連鎖四大解決方案。每套方案皆包含完整的入庫、儲位、揀貨、出貨流程管理，差異在於貨主數量、計費模式、串接深度等進階功能的配置。</p></div>\n\n<div class=\"feat-section\">\n<h4 class=\"feat-section-title\">為何已有 ERP 仍需 WMS？</h4>\n<p style=\"line-height:1.9;color:#333\">ERP 聚焦帳務面向，WMS 處理實務執行層面。系統協助企業建立「標準化管理流程」，從初創到跨國連鎖皆適用。兩者互補，而非替代。</p>\n</div>\n\n<div class=\"added\"><p class=\"a-label\">AEO 新增：ERP vs WMS 比較表（原版只有光譜圖設計建議，無實際表格）</p><table><tr><th>比較項目</th><th>Excel / 人工</th><th>ERP 倉儲模組</th><th>GoWarehouse WMS</th></tr>\n<tr><td>即時庫存準確度</td><td>60-70%</td><td>80-85%</td><td>99%+</td></tr>\n<tr><td>出貨錯誤率</td><td>3-5%</td><td>1-2%</td><td>0.01%</td></tr>\n<tr><td>新人上手時間</td><td>2-4 週</td><td>1-2 週</td><td>2 天</td></tr>\n<tr><td>多平台串接</td><td>手動匯出匯入</td><td>部分支援</td><td>自動串接主流電商平台</td></tr>\n<tr><td>批號效期追蹤</td><td>無</td><td>基本</td><td>FEFO 自動管理</td></tr>\n<tr><td>行動裝置支援</td><td>無</td><td>有限</td><td>完整手機 APP</td></tr>\n<tr><td>AI 助理</td><td>無</td><td>無</td><td>Vanta × Claude 24/7</td></tr></table></div>\n\n<div class=\"feat-section\">\n<h4 class=\"feat-section-title\">半自動化 vs 全自動化</h4>\n<p style=\"line-height:1.9;color:#333;margin-bottom:16px\">核心論點：企業應選擇「半自動化」，以最低成本換取最高彈性。</p>\n\n<div class=\"plan-card-grid\" style=\"grid-template-columns:repeat(3,1fr)\">\n<div class=\"feat-highlight-card\" style=\"background:#f5f5f5\">\n<p class=\"feat-highlight-title\"><strong>傳統人工</strong></p>\n<p class=\"feat-highlight-body\">依賴紙本與 Excel，混亂且高度依賴資深員工記憶。</p>\n</div>\n<div class=\"feat-highlight-card\" style=\"background:#fff;border:2px solid #000\">\n<p class=\"feat-highlight-title\"><strong>半自動化（最佳 ROI）</strong></p>\n<p class=\"feat-highlight-body\">系統引導 SOP + 手機 APP 掃碼，有序且低成本。</p>\n</div>\n<div class=\"feat-highlight-card\" style=\"background:#f5f5f5\">\n<p class=\"feat-highlight-title\"><strong>全自動化機器人</strong></p>\n<p class=\"feat-highlight-body\">高昂投資、缺乏彈性，僅適用超大型穩定場景。</p>\n</div>\n</div>\n\n<div style=\"margin-top:20px\">\n<p style=\"margin:6px 0\"><strong>低門檻入局：</strong><span class=\"modified\">不需昂貴自動化倉儲系統（AS/RS），透過手機 APP 搭配系統引導即可完成倉庫數位化，設備投資接近零</span></p>\n<p style=\"margin:6px 0\"><strong>極致靈活：</strong>人員可隨時增減，系統自動引導標準作業</p>\n<p style=\"margin:6px 0\"><strong>精準執行：</strong>手機智慧引導結合系統精準度</p>\n</div>\n</div>\n\n<div class=\"feat-section\">\n<h4 class=\"feat-section-title\">四大解決方案，對應你的營運型態</h4>\n<p style=\"line-height:1.9;color:#333;margin-bottom:16px\">不同規模、不同產業，需要的系統配置不一樣。點選方案查看詳細內容：</p>\n<div class=\"plan-card-grid\">\n<div class=\"feat-highlight-card click-card\" onclick=\"showSection('plan-a')\" style=\"cursor:pointer\">\n<p class=\"feat-highlight-title\" style=\"font-size:17px\"><strong>品牌成長方案 →</strong></p>\n<p class=\"feat-highlight-body\" style=\"font-size:14px\">適合日出貨 50-500 件的 2C 電商初創品牌。建立第一套國際標準出貨 SOP。</p>\n</div>\n<div class=\"feat-highlight-card click-card\" onclick=\"showSection('plan-b')\" style=\"cursor:pointer\">\n<p class=\"feat-highlight-title\" style=\"font-size:17px\"><strong>企業全通路方案 →</strong></p>\n<p class=\"feat-highlight-body\" style=\"font-size:14px\">適合 2B + 2C 混合通路的中大型企業。整合跨通路訂單流，一盤貨管理。</p>\n</div>\n<div class=\"feat-highlight-card click-card\" onclick=\"showSection('plan-c')\" style=\"cursor:pointer\">\n<p class=\"feat-highlight-title\" style=\"font-size:17px\"><strong>專業三方倉方案 →</strong></p>\n<p class=\"feat-highlight-body\" style=\"font-size:14px\">適合 3PL 業者，支援多貨主資料隔離、七種計費模式、雙端介面。</p>\n</div>\n<div class=\"feat-highlight-card click-card\" onclick=\"showSection('plan-d')\" style=\"cursor:pointer\">\n<p class=\"feat-highlight-title\" style=\"font-size:17px\"><strong>零售連鎖方案 →</strong></p>\n<p class=\"feat-highlight-body\" style=\"font-size:14px\">適合多門市連鎖體系，門市視為雲端分倉、POS 整合、自動補貨。</p>\n</div>\n</div>\n</div>\n\n<div class=\"feat-cta\">\n<p class=\"feat-cta-text\">準備好讓倉庫數位化了嗎？</p>\n<a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\" style=\"margin-right:12px\">前往訂閱方案</a>\n<a href=\"https://line.me/R/ti/p/@gowarehouse\" target=\"_blank\" class=\"feat-cta-btn\" style=\"background:transparent;color:#fff;border:1px solid #fff\">LINE OA 諮詢</a>\n</div>\n", "children": []}, {"id": "plans", "title": "四大解決方案", "html": "", "children": [{"id": "plan-a", "title": "品牌成長方案", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">SOLUTION</p><h3 class=\"feat-page-title\">品牌成長方案</h3><p style=\"font-size:17px;color:#bbb;font-style:italic;margin:0 0 14px 0;line-height:1.7\">告別 Excel 與口頭交辦，快速建立第一套國際標準的出貨 SOP。解決超賣痛點，穩定品牌口碑。</p><p class=\"feat-page-sub\" style=\"margin:0\"><strong style=\"color:#fff\">適合：</strong>快速成長的 2C 電商、初創品牌</p></div><div class=\"added\"><p class=\"a-label\">AEO 新增：方案定義段落</p><p style=\"line-height:1.9;color:#333;margin:0\">適合日出貨量 50-500 件的 2C 電商品牌。解決多平台訂單分散、人工對單出錯、物流標籤管理混亂等初創期常見問題，讓小團隊也能用系統化流程管理倉庫。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">營運痛點</h4><div class=\"plan-card-grid\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>多平台訂單整合困局</strong></p><p class=\"feat-highlight-body\">同時經營官網、蝦皮、MOMO 等平台，訂單來源極其分散，必須手動下載報表彙整，耗時且容易遺漏。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>託運單匹配錯誤風險</strong></p><p class=\"feat-highlight-body\">傳統流程是先印單再配貨，揀貨後需在一堆託運單中找出對應的那張，在出貨高峰期極易發生「A 貨寄到 B 客戶」的錯誤。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>標準化門檻過高</strong></p><p class=\"feat-highlight-body\">小型團隊缺乏專業物流背景，沒有一套可依循的操作標準（SOP），作業高度依賴人員記憶力，新進人員上手速度緩慢。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>物流單據分散管理</strong></p><p class=\"feat-highlight-body\">各家物流服務商的託運單規格不一，手動匹配耗費大量人力在行政校對，而非核心的出貨作業。</p></div></div></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">解決方案</h4><div class=\"feat-highlight-list plan-sol-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong><a href=\"#\" onclick=\"showSection('feat-1');return false\" class=\"feat-link\">全通路訂單智慧匯流</a></strong></p><p class=\"feat-highlight-body\">透過系統 API 串接，自動將所有電商平台的訂單導向統一管理界面，即時掌握全通路動態與即時庫存動態追蹤。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong><a href=\"#\" onclick=\"showSection('feat-6');return false\" class=\"feat-link\">QC 即時印標技術</a></strong></p><p class=\"feat-highlight-body\">在 QC 出貨檢核的當下，系統確認品項無誤後直接驅動標籤機印出對應託運單，確保單貨「絕對匹配」。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>低成本、高效能的數位轉型</strong></p><p class=\"feat-highlight-body\">透過<a href=\"#\" onclick=\"showSection('feat-2');return false\" class=\"feat-link\">手機 APP</a>，一支手機即可實現數位化掃碼，引導人員完成每一道標準工序，無需購入昂貴硬體。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>物流整合生態系</strong></p><p class=\"feat-highlight-body\">一鍵串接主流物流商（如 7-11 賣貨便），自動生成格式統一的單據，簡化行政流程。</p></div></div></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">實戰故事</h4><div class=\"plan-story-body\"><p>「品牌 U」以精緻電剪聞名，訂單遍布各大電商通路。為了更緊密連結生產工廠與出貨流程，他們選擇將物流業務回歸自營，並透過<a href=\"#\" onclick=\"showSection('feat-1');return false\" class=\"feat-link\">全通路訂單自動化</a>整合所有零散來源，確保生活日用類的繁雜訂單在跨場域調度中依然能保持數據精準。他們證明了即使選擇自營，也無需犧牲專業系統的便利性，反而能獲得更彈性的營運自主權。</p><p>導入系統後，自營倉庫也能擁有像三方倉一樣的高效動能。透過<a href=\"#\" onclick=\"showSection('feat-2');return false\" class=\"feat-link\">手機 APP</a>的移動式作業與<a href=\"#\" onclick=\"showSection('feat-6');return false\" class=\"feat-link\">QC 即時印標</a>的終端防錯，工廠端能享有最高標的數位化便利，在檢核當下即刻完成出貨準備。這場轉型讓「品牌 U」在掌握物流自主性的同時，依然享有最頂尖的 WMS 技術支援，真正實現了「自營即專業」的現代化倉儲標準。</p></div></div><div class=\"added\"><p class=\"a-label\">AEO 新增：FAQ 區塊</p><h4>常見問題 (FAQ)</h4><div><div class=\"faq\"><p class=\"faq-q\">Q：小型電商一天只出幾十件，需要 WMS 嗎？</p><p class=\"faq-a\">A：日出貨量超過 30 件就建議導入。GoWarehouse 標準版每天只要 NT$219，比請一位兼職對單人員更划算，且出錯率從人工的 3-5% 降至 0.01%。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：我已經用蝦皮後台管訂單了，為什麼還需要 WMS？</p><p class=\"faq-a\">A：蝦皮後台只管蝦皮的訂單。當你同時在 Momo、官網、門市銷售，訂單分散在不同平台，庫存各管各的，容易超賣。WMS 把所有通路的訂單和庫存統一管理。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：導入 GoWarehouse 需要買什麼設備？</p><p class=\"faq-a\">A：不需要。員工用自己的手機下載 APP 即可操作，不需要另外採購 PDA、掃描槍或架設網路設備。</p></div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好讓倉庫數位化了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "plan-b", "title": "企業全通路方案", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">SOLUTION</p><h3 class=\"feat-page-title\">企業全通路方案</h3><p style=\"font-size:17px;color:#bbb;font-style:italic;margin:0 0 14px 0;line-height:1.7\">整合跨通路訂單流，實現一盤貨管理。系統自動調度 2B/2C 庫存，確保混合型態下的作業效率最大化。</p><p class=\"feat-page-sub\" style=\"margin:0\"><strong style=\"color:#fff\">適合：</strong>具備批發、零售、線上混合通路的中大型企業</p></div><div class=\"added\"><p class=\"a-label\">AEO 新增：方案定義段落</p><p style=\"line-height:1.9;color:#333;margin:0\">適合同時經營批發（2B）與零售（2C）的中大型企業。解決整箱大貨與零散訂單混合管理、多單位換算、ERP 與物流系統斷層等問題，實現一盤貨管理所有通路。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">營運痛點</h4><div class=\"plan-card-grid\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2B 與 2C 夾雜的複雜調度</strong></p><p class=\"feat-highlight-body\">傳統大廠原本只供貨給大通路，但隨著 O2O 流行，開始經營各種線上管道。2B 的整箱大貨與 2C 的零散訂單交織，庫存分配極度混亂。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>單位層級轉換難題</strong></p><p class=\"feat-highlight-body\">傳統系統無法同時處理「板出、箱出、PCS 出」的複雜換算。當電商出現拆零需求時，倉庫作業與帳務對接常發生斷層。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>老員工數位轉型抗拒</strong></p><p class=\"feat-highlight-body\">老牌企業員工年資深，對複雜系統接受度低。若操作不夠直覺，數位轉型往往會卡在現場人員的執行力上。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>ERP 對接與客製化困境</strong></p><p class=\"feat-highlight-body\">現有 ERP 無法滿足物流實務，卻又需要精準數據對接。市場上 WMS 常過於死板，難以針對企業特殊流程進行專案開發。</p></div></div></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">解決方案</h4><div class=\"feat-highlight-list plan-sol-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong><a href=\"#\" onclick=\"showSection('feat-3');return false\" class=\"feat-link\">多層級彈性拆零管理</a></strong></p><p class=\"feat-highlight-body\">完美支援「板、箱、件」三層單位。無論是整棧板進、拆箱散件出，系統皆能精準換算，確保現場數據完美勾稽。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong><a href=\"#\" onclick=\"showSection('feat-1');return false\" class=\"feat-link\">全通路一盤貨管理</a></strong></p><p class=\"feat-highlight-body\">打破 2B/2C 界線，將庫存視為統一資源池，依據通路重要性自動調度，提升資產周轉率。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>極簡化 UI 設計</strong></p><p class=\"feat-highlight-body\">針對資深員工優化操作介面，透過圖形化引導降低學習門檻，讓「老字號」也能輕鬆對接數位化 SOP。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>專案式開發整合能力</strong></p><p class=\"feat-highlight-body\">我們提供標準模組，同時能為企業進行專案式規劃。無論是 ERP 對接或特殊流程客製，皆能精準達成。</p></div></div></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">實戰故事</h4><div class=\"plan-story-body\"><p>「品牌 S」是陪伴無數台灣人成長的休閒食品大廠。隨著通路型態從單一批發轉向 O2O 混合經營，他們面臨了巨大挑戰：老員工們習慣了搬運整棧板的貨物，現在卻要面對電商平台的散件訂單。更棘手的是，大型連鎖通路對<a href=\"#\" onclick=\"showSection('ind-food');return false\" class=\"feat-link\">食品生技</a>類的產品效期有著極其「龜毛」的收貨標準，只要批號抓錯，整車貨物就會被退回，造成巨大的運費與報廢損失。</p><p>為了保住這塊老招牌，他們決定導入<a href=\"#\" onclick=\"showSection('feat-3');return false\" class=\"feat-link\">多層彈性點收</a>技術，並將現場流程與<a href=\"#\" onclick=\"showSection('feat-5');return false\" class=\"feat-link\">批號效期管理</a>深度綁定。現在，當工廠內的資深員工拿著<a href=\"#\" onclick=\"showSection('feat-2');return false\" class=\"feat-link\">手機 APP</a>作業時，系統會自動判斷這張訂單是發往哪家通路，並指引人員去對應的儲位領取符合效期要求的批次。這場轉型不僅解決了 2B/2C 混合出貨的混亂，更讓這家老牌大廠在維持數位競爭力的同時，守住了對品質與效期的嚴謹承諾。</p></div></div><div class=\"added\"><p class=\"a-label\">AEO 新增：FAQ 區塊</p><h4>常見問題 (FAQ)</h4><div><div class=\"faq\"><p class=\"faq-q\">Q：2B 批發和 2C 零售的庫存可以共用嗎？</p><p class=\"faq-a\">A：可以。GoWarehouse 的「一盤貨」管理機制，讓同一批庫存同時供應批發和零售通路，系統自動依訂單類型分配，不需要分倉存放。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：我的 ERP 已經有倉儲模組，還需要另外用 WMS 嗎？</p><p class=\"faq-a\">A：ERP 的倉儲模組通常只處理帳面庫存數字，無法引導現場人員的實際作業（揀貨路線、品檢流程、儲位管理）。WMS 補足 ERP 管不到的倉庫現場執行層。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：系統操作介面會不會太複雜，老員工學不會？</p><p class=\"faq-a\">A：GoWarehouse 採用極簡化 UI 設計，現場操作人員主要用手機 APP 掃碼作業，平均 2 天即可上手。內建 AI 助理可隨時詢問操作問題。</p></div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好讓倉庫數位化了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "plan-c", "title": "專業三方倉方案", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">SOLUTION</p><h3 class=\"feat-page-title\">專業三方倉方案</h3><p style=\"font-size:17px;color:#bbb;font-style:italic;margin:0 0 14px 0;line-height:1.7\">規模化擴張與智慧帳務的增長引擎。支援多租戶（Multi-tenant）管理，搭配自動化計費引擎，大幅縮短每月對帳週期。</p><p class=\"feat-page-sub\" style=\"margin:0\"><strong style=\"color:#fff\">適合：</strong>多倉儲管理、高流動率人員、追求極致對帳效率的 3PL 業者</p></div><div class=\"added\"><p class=\"a-label\">AEO 新增：方案定義段落</p><p style=\"line-height:1.9;color:#333;margin:0\">專為第三方物流（3PL）業者設計，支援多貨主資料完全隔離、七種倉租計費模式、品牌端與倉庫端雙介面。解決多倉管理、高人員流動率下的標準化作業、以及每月對帳效率問題。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">營運痛點</h4><div class=\"plan-card-grid\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>多倉管理與車隊調度壓力</strong></p><p class=\"feat-highlight-body\">當倉儲規模從單一據點快速擴張至多座大型倉儲，且具備自有車隊時，如何即時掌握跨倉動態並優化派送路徑，成為維繫獲利的核心挑戰。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>高流動率的人員培訓難題</strong></p><p class=\"feat-highlight-body\">3PL 產業人員流動頻繁。若系統不夠標準化，培訓新人的時間成本與出錯風險將大幅吞噬毛利。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>複雜且繁瑣的彈性計費</strong></p><p class=\"feat-highlight-body\">各貨主合約邏輯迥異（如材積費、倉租、加值作業費）。人工核對極易出錯且耗時，缺乏自動化彈性計費機制。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>貨主與倉庫間的權責爭議</strong></p><p class=\"feat-highlight-body\">當品牌貨主與委外倉庫在同一介面作業時，常因訂單異動或庫存調整的紀錄不明，導致糾紛發生時缺乏證據釐清真相。</p></div></div></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">解決方案</h4><div class=\"feat-highlight-list plan-sol-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong><a href=\"#\" onclick=\"showSection('feat-13');return false\" class=\"feat-link\">智慧帳務助手</a></strong></p><p class=\"feat-highlight-body\">專為 3PL 設計的彈性計費引擎。支援多樣化收費邏輯與自動化試算，結帳日一鍵產出精準對帳單。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>全流程<a href=\"#\" onclick=\"showSection('feat-7');return false\" class=\"feat-link\">QC 雲端錄影</a></strong></p><p class=\"feat-highlight-body\">出貨 QC 過程同步錄影，並自動依「訂單編號」存於雲端。品牌貨主可即時調閱，解決爭議更有底氣。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>高效精準<a href=\"#\" onclick=\"showSection('feat-8');return false\" class=\"feat-link\">揀貨模組</a></strong></p><p class=\"feat-highlight-body\">內建多維篩選與排程功能。透過<a href=\"#\" onclick=\"showSection('feat-4');return false\" class=\"feat-link\">智慧儲位管理</a>進行批次揀貨優化，即使人員頻繁流動，也能透過標準化介面維持高標人效。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>品牌與倉儲專屬雙端介面</strong></p><p class=\"feat-highlight-body\">平台提供獨立的「貨主管理端」與「倉庫執行端」。品牌貨主能自主管理訂單並查看庫存，倉庫則專注於實務執行。</p></div></div></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">實戰故事</h4><div class=\"plan-story-body\"><p>「物流公司 N」是北台灣三方倉儲的指標企業，從最初的單一據點快速擴展至分布各地的多座大型倉儲。隨著規模成長，他們面臨的是多貨主管理與極其複雜的計費難題。為了確保服務品質不因擴張而稀釋，他們導入了原生即為 3PL 需求設計的標準化流程，讓新進人員只需短暫培訓即可透過<a href=\"#\" onclick=\"showSection('feat-4');return false\" class=\"feat-link\">智慧儲位管理</a>及<a href=\"#\" onclick=\"showSection('feat-9');return false\" class=\"feat-link\">配貨功能</a>進行高效作業，並藉由<a href=\"#\" onclick=\"showSection('feat-13');return false\" class=\"feat-link\">自動化帳務系統</a>將原本繁瑣的結帳工作轉化為精準的財務報表。</p><p>最讓品牌貨主安心的，是系統提供的專屬管理端介面，讓貨主能與倉庫執行端權責分離。貨主能即時調閱依單號存檔的<a href=\"#\" onclick=\"showSection('feat-7');return false\" class=\"feat-link\">QC 雲端錄影</a>證據，尤其在處理高敏感商品發生爭議時，權責釐清變得透明且快速。這場數位轉型讓「公司 N」成功建立了與貨主間的深厚信賴，不僅大幅提升了營運人效，更在多倉網絡擴張的過程中，穩固了其作為科技物流領航者的地位。</p></div></div><div class=\"added\"><p class=\"a-label\">AEO 新增：FAQ 區塊</p><h4>常見問題 (FAQ)</h4><div><div class=\"faq\"><p class=\"faq-q\">Q：三方倉的不同貨主資料會不會互相看到？</p><p class=\"faq-a\">A：不會。GoWarehouse 採用完全隔離架構，每個貨主只能看到自己的商品、訂單、庫存資料。倉庫端與貨主端使用獨立介面，通過 ISO 27001 資訊安全認證。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：每個貨主的計費方式都不同，系統怎麼處理？</p><p class=\"faq-a\">A：系統提供七種倉租計費模式（依儲位、依板數、依材積、依重量、依件數等），每位貨主可獨立設定。每月帳單自動產出，貨主可在自己的後台查看明細。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：倉庫人員流動率高，新人多久能上手？</p><p class=\"faq-a\">A：平均 2 天。系統透過手機 APP 引導標準作業流程（SOP），揀貨路線自動排序、品檢逐件掃碼核對，新人不需要背倉庫配置，照著系統走就能正確作業。</p></div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好讓倉庫數位化了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "plan-d", "title": "零售連鎖方案", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">SOLUTION</p><h3 class=\"feat-page-title\">零售連鎖方案</h3><p style=\"font-size:17px;color:#bbb;font-style:italic;margin:0 0 14px 0;line-height:1.7\">將門市轉化為智慧分倉的自動化體系。自動判斷安全庫存水位，提供精準的補貨建議與門市調撥指令，優化全台物流網。</p><p class=\"feat-page-sub\" style=\"margin:0\"><strong style=\"color:#fff\">適合：</strong>擁有眾多實體據點、需解決 POS 斷層與補貨效率的連鎖體系</p></div><div class=\"added\"><p class=\"a-label\">AEO 新增：方案定義段落</p><p style=\"line-height:1.9;color:#333;margin:0\">適合擁有多個實體門市據點的連鎖體系，將每間門市視為「雲端分倉」管理。解決補貨靠感覺、POS 與物流斷層、門市盤點耗時等問題，實現數據驅動的門市庫存管理。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">營運痛點</h4><div class=\"plan-card-grid\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>門市補貨全憑「感覺」</strong></p><p class=\"feat-highlight-body\">總部難以掌握各分店確切的即時庫存現況。店長常憑直覺叫貨，導致部分門市熱銷品斷貨，部分門市卻因物料積壓過久造成報廢損耗。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>POS 與物流端的數據斷層</strong></p><p class=\"feat-highlight-body\">銷售端數據無法即時回流至物流體系。當門市需要緊急調撥或補貨時，總倉無法第一時間做出反應，造成通路端嚴重的業績損失。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>缺乏科學的安全庫存機制</strong></p><p class=\"feat-highlight-body\">沒有統一的數位化預警設定，導致連鎖體系的資源調度極度依賴資深店長的個人經驗，而非客觀的數據分析。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>門市實務流程難以數位化</strong></p><p class=\"feat-highlight-body\">門市進貨、退貨、調撥等流程在傳遞過程中常產生數據漏失，導致全台物流網出現資產黑洞，難以落實標準化的作業 SOP。</p></div></div></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">解決方案</h4><div class=\"feat-highlight-list plan-sol-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong><a href=\"#\" onclick=\"showSection('feat-12');return false\" class=\"feat-link\">安全庫存與自動補貨機制</a></strong></p><p class=\"feat-highlight-body\">將全台門市視為「雲端分倉」。系統依據銷售動態與安全水位設定，自動發出補貨指令，實現數據導航的智慧供應。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>POS 專案整合開發（<a href=\"#\" onclick=\"showSection('feat-15');return false\" class=\"feat-link\">開放整合平台</a>）</strong></p><p class=\"feat-highlight-body\">針對企業現有 POS 系統提供專案式串接，將銷售端的即時異動轉化為物流作業指令，把繁瑣的實務狀況完全數位化。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>連鎖零售門市模組</strong></p><p class=\"feat-highlight-body\">門市人員能透過<a href=\"#\" onclick=\"showSection('feat-2');return false\" class=\"feat-link\">手機 APP</a>輕鬆處理進貨、調撥與盤點。所有數據即時回傳總部，確保全通路資產透明且流向可追蹤。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>智慧調撥建議</strong></p><p class=\"feat-highlight-body\">系統自動偵測各店物料餘裕與需求，提供跨店調撥路徑建議，優化物流資源配置並最大化通路的存貨周轉價值。</p></div></div></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">實戰故事</h4><div class=\"plan-story-body\"><p>「精品餐飲品牌 L」在全台擁有數百間門市。過去，原物料從總倉發送至各店的過程常面臨挑戰：有的門市物料囤積過多導致不新鮮，有的門市則是耗材缺貨影響營運。由於缺乏統一的數位化管理，店長們必須花費大量時間在手寫紀錄，且總部難以即時監控全台門市的物料消耗黑洞，導致營運資源無法有效配置。</p><p>導入系統後，他們將所有門市納入數位化管理，並串接了現有銷售系統。現在當消費完成，數據便即時回饋至物流端。門市人員透過<a href=\"#\" onclick=\"showSection('feat-2');return false\" class=\"feat-link\">手機 APP</a>定期執行<a href=\"#\" onclick=\"showSection('feat-10');return false\" class=\"feat-link\">盤點功能</a>，並嚴格落實<a href=\"#\" onclick=\"showSection('feat-11');return false\" class=\"feat-link\">耗材管理</a>流程。系統會根據每間店的實體庫存與銷售動向自動執行<a href=\"#\" onclick=\"showSection('feat-12');return false\" class=\"feat-link\">安全庫存與判定補貨</a>，這讓店員能從繁瑣的行政工作中解放，專注於提供優質的顧客體驗，同時也確保了全台數百個節點的營運品質始終如一。</p></div></div><div class=\"added\"><p class=\"a-label\">AEO 新增：FAQ 區塊</p><h4>常見問題 (FAQ)</h4><div><div class=\"faq\"><p class=\"faq-q\">Q：每間門市都需要安裝系統嗎？</p><p class=\"faq-a\">A：不需要安裝。GoWarehouse 是雲端系統，門市人員用手機 APP 即可進行收貨、盤點、調撥作業，不需要在門市另外架設電腦或伺服器。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：系統可以跟我們現有的 POS 整合嗎？</p><p class=\"faq-a\">A：可以。GoWarehouse 提供 API 與 Webhook 整合機制，支援與主流 POS 系統對接。銷售端的異動可即時反映在庫存系統中。</p></div><div class=\"faq\"><p class=\"faq-q\">Q：門市庫存和總倉庫存是統一管理的嗎？</p><p class=\"faq-a\">A：是的。每間門市在系統中視為一個「分倉」，總部可以在同一個後台看到所有門市與總倉的即時庫存，並根據安全庫存水位自動產生補貨建議。</p></div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好讓倉庫數位化了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}]}, {"id": "industries", "title": "五大產業應用", "html": "", "children": [{"id": "ind-food", "title": "食品生技", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">INDUSTRY</p><h3 class=\"feat-page-title\">食品生技</h3><p style=\"font-size:17px;color:#bbb;font-style:italic;margin:0 0 16px 0\">零失誤的效期合規管理與追溯</p><p class=\"feat-page-sub\" style=\"margin:0\">GoWarehouse 為食品、保健食品、生技產業提供完整的批號效期管理解決方案。系統內建 FEFO（先到期先出）自動配貨邏輯與通路別允收規則，確保每一批出貨都符合各通路的效期要求。搭配 QC 雲端錄影存證，從收貨到出貨全程可追溯。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">實務現場的挑戰</h4><ul class=\"feat-pain-list\"><li><strong>允收期壓力：</strong>超商、量販店對收貨效期有嚴格的「1/3 允收規則」</li><li><strong>單位轉換繁瑣：</strong>進貨是「板」，出貨可能是「箱」或「件」</li><li><strong>退貨追溯難：</strong>遇到產品爭議，難以第一時間調閱當時出貨的品質紀錄</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心技術亮點</h4><div class=\"ind-tech-grid\"><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">01</p><h5 class=\"ind-tech-title\">嚴謹的通路允收邏輯</h5><p class=\"ind-tech-body\">系統內建「允收引擎」，各通路依天數或效期比例設定（<a href=\"#\" onclick=\"showSection('feat-5');return false\" class=\"feat-link\">批號效期管理</a>）</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">02</p><h5 class=\"ind-tech-title\">彈性的多單位點收機制</h5><p class=\"ind-tech-body\">支援「板＝箱＝件」三層換算（<a href=\"#\" onclick=\"showSection('feat-3');return false\" class=\"feat-link\">多層彈性點收</a>）</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">03</p><h5 class=\"ind-tech-title\">出貨即存證的品質管理</h5><p class=\"ind-tech-body\"><a href=\"#\" onclick=\"showSection('feat-7');return false\" class=\"feat-link\">QC 雲端錄影</a>與單據編號勾稽</p></div></div></div><div class=\"ind-stat-block\"><p class=\"ind-stat-label\">數位轉型的量化價值</p><p class=\"ind-stat-value\">導入後平均過期報廢率降低 85%，出貨錯誤率降至 0.01%。</p></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">產業專家 Q&A</h4><div class=\"ind-qa-list\"><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：如果遇到政府抽檢或食安通報，系統能多快找出該批號的流向？</p><p class=\"ind-qa-a\">A：GoWarehouse 系統完整記錄每一筆批號的進出履歷。透過庫存異動紀錄，您可以查詢該批號從哪一張入庫單進貨、目前存放在哪些儲位、以及出貨到哪些訂單，快速掌握批號流向，降低品牌危機處理成本。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：我們的產品有不同批號混放的問題，系統能處理嗎？</p><p class=\"ind-qa-a\">A：可以。GoWarehouse 支持「混批管理」，並在揀貨時引導人員前往正確批號的儲位。即使同一格位有不同批號，人員也必須掃描特定批號條碼才能過關，確保出貨批次的絕對精準。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：食品業常見的「一物多條碼」（如外箱條碼與內包裝條碼不同），系統如何識別？</p><p class=\"ind-qa-a\">A：這正是【多層彈性點收】的強項。系統支援條碼階層管理，掃描外箱自動帶入整箱數量，拆零時掃描內袋則計為單件。無論哪種條碼，背後的庫存數據皆能即時連動，杜絕人為換算的失誤。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：什麼是 FEFO？跟 FIFO 有什麼不同？</p><p class=\"ind-qa-a\">A：FEFO（First Expired, First Out）是先到期先出，系統依到期日而非入庫日分配庫存。FIFO（First In, First Out）是先進先出，依入庫時間排序。食品產業建議用 FEFO，避免長效期的商品反而先出貨，短效期的被壓在倉庫過期。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：不同通路的允收天數可以各自設定嗎？</p><p class=\"ind-qa-a\">A：可以。GoWarehouse 支援每個銷售通路獨立設定效期門檻，例如 Momo 要求剩 180 天、蝦皮要求 90 天、官網不限。系統在分配庫存時自動過濾不符合的批次。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：出貨後客人說收到即期品，怎麼舉證？</p><p class=\"ind-qa-a\">A：系統在品檢時自動記錄出貨批號與效期，並搭配 QC 雲端錄影全程存證。收到客訴時，依出貨單號即可調閱當時的品檢影片與批號資訊。</p></div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">找到最適合你產業的解決方案</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "ind-fashion", "title": "服飾鞋包", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">INDUSTRY</p><h3 class=\"feat-page-title\">服飾鞋包</h3><p style=\"font-size:17px;color:#bbb;font-style:italic;margin:0 0 16px 0\">擊碎 SKU 迷宮，實現極速配貨與精準庫存</p><p class=\"feat-page-sub\" style=\"margin:0\">GoWarehouse 為服飾、鞋類、包袋產業提供矩陣式 SKU 管理（款式×顏色×尺寸），搭配全通路一盤貨庫存分配與兩階段防超賣機制，解決多平台同時販售時庫存不同步的問題。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">實務現場的挑戰</h4><ul class=\"feat-pain-list\"><li><strong>SKU 矩陣災難：</strong>同款商品多種顏色與尺寸，人工揀貨出錯率極高</li><li><strong>全通路超賣風險：</strong>多平台同步販售，各平台庫存各管各的</li><li><strong>換季移倉壓力：</strong>季節性極強，新品進貨與過季品移倉頻率高</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心技術亮點</h4><div class=\"ind-tech-grid\"><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">01</p><h5 class=\"ind-tech-title\">解決 SKU 找貨難題的<a href=\"#\" onclick=\"showSection('feat-4');return false\" class=\"feat-link\">智慧儲位管理</a></h5><p class=\"ind-tech-body\">龐雜「款/色/碼」邏輯化分區</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">02</p><h5 class=\"ind-tech-title\">跨平台庫存分配</h5><p class=\"ind-tech-body\"><a href=\"#\" onclick=\"showSection('feat-1');return false\" class=\"feat-link\">全通路訂單自動化</a>，統一管理「一盤貨」</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">03</p><h5 class=\"ind-tech-title\">出貨零出錯的數位防線</h5><p class=\"ind-tech-body\"><a href=\"#\" onclick=\"showSection('feat-6');return false\" class=\"feat-link\">QC 即時印標</a>確保品項正確</p></div></div></div><div class=\"ind-stat-block\"><p class=\"ind-stat-label\">數位轉型的量化價值</p><p class=\"ind-stat-value\">揀貨人效提升 150%、出貨錯誤率降低至 0.01%、換季移倉速度加快 3 倍。</p></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">產業專家 Q&A</h4><div class=\"ind-qa-list\"><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：服飾業新品上架量極大，如何快速建立大量的 SKU 與條碼資訊？</p><p class=\"ind-qa-a\">A：系統支援 Excel 批量匯入與欄位自動對應。您只需上傳新品清單，系統即可自動產出條碼編號並預分儲位。人員配合【最強手機 APP】即可快速完成上架綁定。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：服飾業退換貨率極高，系統如何優化這部分的作業流程？</p><p class=\"ind-qa-a\">A：收到退貨後，人員掃碼即可判定狀態。若是良品，系統即刻指引最近的空儲位並重新上架，透過【全通路訂單自動化】同步恢復可售庫存，極大化商品的銷售時效。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：當現貨與預購商品混在同一張訂單時，系統該如何配置？</p><p class=\"ind-qa-a\">A：系統支援「部分出貨」與「缺貨自動補配」機制。當訂單中部分商品缺貨時，可設定先出現有庫存，缺貨品項自動進入等待狀態。待新貨入庫後，系統自動重新配庫並觸發出貨流程，期間已保留的庫存額度不會被其他訂單搶走。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：面對數萬件細碎的服飾庫存，如何進行高頻次的精準盤點？</p><p class=\"ind-qa-a\">A：我們推薦「循環盤點」模式。利用【盤點功能】，您可以針對特定品牌或儲區進行不停工盤點。手機 APP 顯示預期數量，人員掃碼回傳實數後，系統自動產生差異報表，確保帳實永遠相符。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：同一款衣服有 5 個顏色、6 個尺寸，系統怎麼管理？</p><p class=\"ind-qa-a\">A：GoWarehouse 支援矩陣式 SKU 管理，一個款號下可展開所有顏色×尺寸的組合。庫存、揀貨、盤點都依 SKU 精確管理，不會因為規格太多而混亂。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：多平台同時賣，怎麼防止超賣？</p><p class=\"ind-qa-a\">A：系統採用兩階段防超賣機制：訂單成立時先預留庫存、確認出貨時再扣減。搭配即時庫存同步功能，可隨時將 WMS 內的實際庫存按設定比例推送回各電商平台，確保各平台顯示的可售數量與實際庫存一致。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：換季時大量新品進貨和舊品移倉，系統可以處理嗎？</p><p class=\"ind-qa-a\">A：可以。系統支援批量入庫與倉間調撥功能，搭配智慧儲位推薦，新品上架自動分配最佳位置，過季品可批量移至特定區域或調撥至其他倉庫。</p></div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">找到最適合你產業的解決方案</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "ind-daily", "title": "生活日用", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">INDUSTRY</p><h3 class=\"feat-page-title\">生活日用</h3><p style=\"font-size:17px;color:#bbb;font-style:italic;margin:0 0 16px 0\">應對高頻次爆單，實現極速配批與包材精算</p><p class=\"feat-page-sub\" style=\"margin:0\">GoWarehouse 為生活日用品產業提供波次揀貨與配貨優化方案，透過「總揀後分貨」模式大幅降低倉庫行走距離。搭配耗材管理與動態補貨機制，解決高 SKU、高頻次出貨場景下的效率與成本問題。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">實務現場的挑戰</h4><ul class=\"feat-pain-list\"><li><strong>無效行走過多：</strong>商品種類上千種，一張單常只買一個杯子或一包紙巾</li><li><strong>贈品與包材失控：</strong>促銷活動多，隨貨贈品常漏發或超發</li><li><strong>瞬間爆單壓力：</strong>雙 11 或直播帶貨時，短時間內上萬筆訂單</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心技術亮點</h4><div class=\"ind-tech-grid\"><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">01</p><h5 class=\"ind-tech-title\">提升出貨產能的<a href=\"#\" onclick=\"showSection('feat-8');return false\" class=\"feat-link\">揀貨模組</a>與<a href=\"#\" onclick=\"showSection('feat-9');return false\" class=\"feat-link\">配貨功能</a></h5><p class=\"ind-tech-body\">「總揀後分貨」大幅降低倉庫行走距離</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">02</p><h5 class=\"ind-tech-title\">精準控管隱形成本的<a href=\"#\" onclick=\"showSection('feat-11');return false\" class=\"feat-link\">耗材管理</a></h5><p class=\"ind-tech-body\">非商品類庫存精準掌控</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">03</p><h5 class=\"ind-tech-title\">自動化的動態補貨機制</h5><p class=\"ind-tech-body\">根據銷售速率自動預警補貨（<a href=\"#\" onclick=\"showSection('feat-12');return false\" class=\"feat-link\">安全庫存與判定補貨</a>）</p></div></div></div><div class=\"ind-stat-block\"><p class=\"ind-stat-label\">數位轉型的量化價值</p><p class=\"ind-stat-value\">導入波次揀貨後，平均出貨速度提升 200-300%。</p></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">產業專家 Q&A</h4><div class=\"ind-qa-list\"><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：生活日用商品常有「買 A 送 B」的促銷，系統如何確保贈品不漏發？</p><p class=\"ind-qa-a\">A：您可以透過系統設定「隨貨贈品規則」。當【全通路訂單自動化】抓到特定品項時，系統會自動在揀貨清單與核對畫面中加入贈品項。人員必須掃描贈品條碼，【QC 即時印標】才會產出單據，確保贈品發放準確無誤。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：我們有上千個品項，每天訂單量很大，Excel 匯入訂單會不會很慢？</p><p class=\"ind-qa-a\">A：系統針對大規模數據處理進行了優化，支援萬筆訂單秒級匯入。系統會自動辨識並分類訂單，確保【揀貨模組】能第一時間產出最有效率的配批結果。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：如果訂單中包含「液體」或「易碎品」，系統能提醒人員加強包裝嗎？</p><p class=\"ind-qa-a\">A：可以。透過商品主檔的自訂屬性功能，您可以為商品標註特殊分類。出貨時，人員可依據商品特性選用適當的防護包材，所有耗材的使用量皆會記錄在【耗材管理】模組中，方便後續成本精算與用量分析。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：門市與電商共用庫存，如何防止門市盤點時影響電商出貨？</p><p class=\"ind-qa-a\">A：我們提供「不停工盤點」功能。利用【盤點功能】，您可以針對特定貨架進行區域盤點，而其他區域的【最強手機 APP】揀貨作業仍可繼續執行，確保營運不中斷，帳實相符更簡單。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：什麼是波次揀貨？跟逐單揀貨差在哪？</p><p class=\"ind-qa-a\">A：逐單揀貨是一張訂單跑一趟倉庫，效率低。波次揀貨是把多張訂單合併，相同商品一次揀齊再分回各訂單。例如 50 張單都有同一款洗髮精，只需要去該儲位一次揀 50 件，而不是跑 50 趟。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：雙 11 爆單時系統撐得住嗎？</p><p class=\"ind-qa-a\">A：撐得住。GoWarehouse 支援自動排程建立揀貨單、多人同時揀貨配貨、即時同步進度。波次揀貨搭配配貨模組，50 張訂單的商品可能一趟就揀完。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：贈品和促銷規則可以自動處理嗎？</p><p class=\"ind-qa-a\">A：可以。系統支援四種觸發條件（訂單金額、重量、數量、指定商品），活動期間訂單進來自動加入贈品，活動結束自動停止。</p></div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">找到最適合你產業的解決方案</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "ind-3c", "title": "3C 電子", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">INDUSTRY</p><h3 class=\"feat-page-title\">3C 電子</h3><p style=\"font-size:17px;color:#bbb;font-style:italic;margin:0 0 16px 0\">精密資產保全，實現一機一號的全程追溯</p><p class=\"feat-page-sub\" style=\"margin:0\">GoWarehouse 為 3C 電子產業提供「一機一號」序號全程追蹤機制。從入庫掃描原廠序號（S/N）建檔，到出貨品檢時自動綁定序號至訂單，搭配 QC 雲端錄影，徹底解決售後缺貨、掉包、損壞爭議的舉證問題。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">實務現場的挑戰</h4><ul class=\"feat-pain-list\"><li><strong>序號紀錄緩慢：</strong>出貨時需人工抄寫序號（S/N），耗時且易出錯</li><li><strong>售後爭議不斷：</strong>消費者反應缺貨、掉包或損壞，缺乏證據</li><li><strong>庫存跌價快速：</strong>電子產品改版快、跌價高，積壓庫存直接變虧損</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心技術亮點</h4><div class=\"ind-tech-grid\"><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">01</p><h5 class=\"ind-tech-title\">實現「一機一號」產品追蹤</h5><p class=\"ind-tech-body\">直接掃原廠 S/N 條碼建立序號紀錄（<a href=\"#\" onclick=\"showSection('feat-6');return false\" class=\"feat-link\">QC 即時印標</a>掃碼綁定）</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">02</p><h5 class=\"ind-tech-title\">終結售後爭議的 <a href=\"#\" onclick=\"showSection('feat-7');return false\" class=\"feat-link\">QC 雲端錄影</a></h5><p class=\"ind-tech-body\">核對動作與錄影深度整合</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">03</p><h5 class=\"ind-tech-title\">高頻次、不停工的<a href=\"#\" onclick=\"showSection('feat-10');return false\" class=\"feat-link\">盤點功能</a></h5><p class=\"ind-tech-body\">局部盤點確保資產安全</p></div></div></div><div class=\"ind-stat-block\"><p class=\"ind-stat-label\">數位轉型的量化價值</p><p class=\"ind-stat-value\">序號紀錄效率提升 5 倍、售後理賠爭議降低 90%、庫存透明度達 100%。</p></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">產業專家 Q&A</h4><div class=\"ind-qa-list\"><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：我們的 3C 產品有很多不同規格（如記憶體大小、顏色），系統如何防範人員拿錯？</p><p class=\"ind-qa-a\">A：在【QC 即時印標】的核對階段，系統會進行「雙重驗證」。人員必須掃描商品條碼與序號條碼，兩者皆符合訂單規格，系統才會列印託運單與保固標籤，完全杜絕誤發可能。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：如果消費者反映收到瑕疵品要退貨，系統如何確認這就是我們當初出的那一台？</p><p class=\"ind-qa-a\">A：這正是【QC 雲端錄影】的價值。您可以輸入退回商品的序號，系統自動回調該序號出貨時的影片。您可以比對序號、外觀是否有損，確保退回來的商品是「原件」，防止惡意掉包。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：我們有提供代組裝服務（如筆電加裝硬碟），系統能記錄這些過程嗎？</p><p class=\"ind-qa-a\">A：可以。您可以將組裝過程視為一道工序，透過【最強手機 APP】紀錄異動。加裝的零件序號同樣能與主機序號綁定，確保整機保固與零件追蹤的完整性。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：3C 產品跌價快，系統能提醒我們哪些是「滯銷庫存」嗎？</p><p class=\"ind-qa-a\">A：【安全庫存與自動補貨】模組具備「庫齡分析」功能。系統會主動預警存放過久的商品，幫助經營者及時進行促銷或清倉處理，將資金佔用的損失降到最低。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：序號追蹤可以做到什麼程度？</p><p class=\"ind-qa-a\">A：從入庫掃描原廠序號建檔開始，到品檢出貨時自動綁定序號至出貨單號，全程可追溯。事後查詢任一序號，可以知道它是哪批入庫、放在哪個儲位、出給哪位客人、品檢影片在哪裡。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：客人說收到的手機是空盒、被掉包，怎麼辦？</p><p class=\"ind-qa-a\">A：系統在品檢時自動錄影，影片中會即時疊加當前掃描的品項與序號。收到爭議時，依出貨單號調閱影片，畫面會清楚顯示當時裝箱的每一件商品與對應序號。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：電子產品跌價快，系統怎麼幫我管庫存？</p><p class=\"ind-qa-a\">A：系統提供滯銷天數監控，超過設定天數沒有出貨的庫存自動標記為滯銷品並提醒處理。搭配庫存健康度儀表板，哪些品項積壓過多一目了然，及早出清減少跌價損失。</p></div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">找到最適合你產業的解決方案</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "ind-retail", "title": "零售連鎖", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">INDUSTRY</p><h3 class=\"feat-page-title\">零售連鎖</h3><p style=\"font-size:17px;color:#bbb;font-style:italic;margin:0 0 16px 0\">打破門市資訊牆，實現數據驅動的精準補貨</p><p class=\"feat-page-sub\" style=\"margin:0\">GoWarehouse 為零售連鎖體系提供門市分倉管理方案，將每間門市視為雲端分倉。透過安全庫存自動計算與補貨建議、手機 APP 盤點、POS 系統整合，讓總部即時掌握所有門市的庫存狀態，實現數據驅動的補貨決策。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">實務現場的挑戰</h4><ul class=\"feat-pain-list\"><li><strong>管理模式僵化：</strong>複雜儲位邏輯造成店員負擔，完全不設儲位倉庫找貨困難</li><li><strong>憑感覺補貨：</strong>店長依主觀經驗叫貨，缺乏數據支撐導致斷貨或爆倉</li><li><strong>盤點負擔沈重：</strong>店員兼顧服務與繁瑣盤點，帳實相符率大幅降低</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心技術亮點</h4><div class=\"ind-tech-grid\"><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">01</p><h5 class=\"ind-tech-title\">支援混合模式的<a href=\"#\" onclick=\"showSection('feat-4');return false\" class=\"feat-link\">智慧儲位管理</a></h5><p class=\"ind-tech-body\">小型門市簡易模式，大型統倉精細規劃</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">02</p><h5 class=\"ind-tech-title\">數據導航的<a href=\"#\" onclick=\"showSection('feat-12');return false\" class=\"feat-link\">安全庫存與判定補貨</a></h5><p class=\"ind-tech-body\">自動計算最佳庫存水位</p></div><div class=\"ind-tech-card\"><p class=\"ind-tech-num\">03</p><h5 class=\"ind-tech-title\">隨時隨地的<a href=\"#\" onclick=\"showSection('feat-10');return false\" class=\"feat-link\">盤點功能</a>與<a href=\"#\" onclick=\"showSection('feat-2');return false\" class=\"feat-link\">手機 APP</a></h5><p class=\"ind-tech-body\">店員空檔即可掃碼盤點</p></div></div></div><div class=\"ind-stat-block\"><p class=\"ind-stat-label\">數位轉型的量化價值</p><p class=\"ind-stat-value\">導入後門市斷貨率降低 60%，人員教育訓練成本減少 70%。</p></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">產業專家 Q&A</h4><div class=\"ind-qa-list\"><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：我們的門市空間很小，真的不需要像統倉那樣分格子儲位，系統能簡化嗎？</p><p class=\"ind-qa-a\">A：絕對可以。GoWarehouse 支援「場域屬性自定義」。您可以將門市設定為單一儲位模式，店員在進貨時只需執行一次點收，商品就直接進入門市庫存，無需進行繁瑣的入庫位操作，將作業門檻降到最低。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：如果我們有「門市對門市」的橫向調撥需求，系統能支援嗎？</p><p class=\"ind-qa-a\">A：可以。系統具備跨點調撥邏輯。管理者可即時查看鄰近據點庫存，發起調撥後，雙方透過【最強手機 APP】執行移倉與收貨，所有異動即時紀錄，確保總部帳務精準。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：新來的工讀生完全不懂物流邏輯，也能操作系統嗎？</p><p class=\"ind-qa-a\">A：可以。APP 介面設計如同通訊軟體般直覺，搭配「簡易模式」管理門市庫存，新人只需掃描商品條碼即可完成盤點或進貨，大幅降低培訓成本。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：總部如何控管各門市的耗材使用量（如提袋、包裝紙）？</p><p class=\"ind-qa-a\">A：您可以將非賣品納入【耗材管理】。門市領用或隨貨發出的耗材會即時回傳，幫助總部精準掌握運營成本，並根據消耗速度自動發起耗材補貨。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：門市數量多，每間都要派人教育訓練嗎？</p><p class=\"ind-qa-a\">A：不需要逐店訓練。GoWarehouse 手機 APP 操作直覺，搭配系統內建 SOP 引導，新門市人員平均 2 天即可上手。總部可統一錄製教學影片，門市自行學習。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：總部可以即時看到每間門市的庫存嗎？</p><p class=\"ind-qa-a\">A：可以。所有門市在系統中視為分倉，總部後台可即時查看每間門市的庫存數量、健康度、補貨需求。不需要打電話問店長「還有沒有貨」。</p></div><div class=\"ind-qa-item\"><p class=\"ind-qa-q\">Q：自動補貨建議是怎麼計算的？</p><p class=\"ind-qa-a\">A：系統根據每個商品在每間門市的歷史銷售速率、設定的安全庫存水位、以及總倉的可用庫存，自動計算補貨數量與時機。庫存低於安全水位時自動產生補貨建議單。</p></div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">找到最適合你產業的解決方案</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}]}, {"id": "arch", "title": "核心架構", "html": "\n<div class=\"feat-hero\">\n<p class=\"feat-page-tag\">ARCHITECTURE</p>\n<h3 class=\"feat-page-title\">核心技術架構</h3>\n<p class=\"feat-page-sub\" style=\"margin:0\">完整涵蓋倉儲生命週期的三層架構：八大作業流程、三大營運管理、四大平台能力。點選功能模組名稱可查看功能詳情。</p>\n</div>\n\n<p style=\"line-height:1.9;color:#333;margin:20px 0 28px 0\">GoWarehouse 的核心架構由八大作業流程模組、三大營運管理模組、四大平台能力組成，涵蓋商品從入庫到退貨的完整生命週期。所有模組均為雲端架構，支援手機 APP 操作與 API 串接。</p>\n\n<div class=\"feat-section\">\n<h4 class=\"feat-section-title\">八大核心作業流程</h4>\n<p style=\"line-height:1.9;color:#333;margin:0 0 20px 0\">貨物生命週期的完整閉環——從進倉、整備、就位，到訂單驅動的取出、出貨、退回，循環往復。</p>\n<svg viewBox=\"-210 -210 420 420\" style=\"width:100%;max-width:480px;display:block;margin:0 auto\">\n<path d=\"M 0 0 L 0.00 -180.00 A 180 180 0 0 1 127.28 -127.28 Z\" fill=\"#f8f8f8\" stroke=\"#000\" stroke-width=\"1.5\" onclick=\"openArchModal('inbound')\" onmouseenter=\"showArchTooltip('inbound',event)\" onmousemove=\"showArchTooltip('inbound',event)\" onmouseleave=\"hideArchTooltip()\" style=\"cursor:pointer;transition:fill .2s\" onmouseover=\"this.style.fill='#e8e8e8'\" onmouseout=\"this.style.fill='#f8f8f8'\" />\n<text x=\"46.84\" y=\"-109.08\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"600\" fill=\"#000\" style=\"pointer-events:none\">入庫管理</text>\n<path d=\"M 0 0 L 127.28 -127.28 A 180 180 0 0 1 180.00 -0.00 Z\" fill=\"#ffffff\" stroke=\"#000\" stroke-width=\"1.5\" onclick=\"openArchModal('process')\" onmouseenter=\"showArchTooltip('process',event)\" onmousemove=\"showArchTooltip('process',event)\" onmouseleave=\"hideArchTooltip()\" style=\"cursor:pointer;transition:fill .2s\" onmouseover=\"this.style.fill='#e8e8e8'\" onmouseout=\"this.style.fill='#ffffff'\" />\n<text x=\"113.08\" y=\"-42.84\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"600\" fill=\"#000\" style=\"pointer-events:none\">加工管理</text>\n<path d=\"M 0 0 L 180.00 -0.00 A 180 180 0 0 1 127.28 127.28 Z\" fill=\"#f8f8f8\" stroke=\"#000\" stroke-width=\"1.5\" onclick=\"openArchModal('inventory')\" onmouseenter=\"showArchTooltip('inventory',event)\" onmousemove=\"showArchTooltip('inventory',event)\" onmouseleave=\"hideArchTooltip()\" style=\"cursor:pointer;transition:fill .2s\" onmouseover=\"this.style.fill='#e8e8e8'\" onmouseout=\"this.style.fill='#f8f8f8'\" />\n<text x=\"113.08\" y=\"50.84\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"600\" fill=\"#000\" style=\"pointer-events:none\">庫存管理</text>\n<path d=\"M 0 0 L 127.28 127.28 A 180 180 0 0 1 0.00 180.00 Z\" fill=\"#ffffff\" stroke=\"#000\" stroke-width=\"1.5\" onclick=\"openArchModal('storage')\" onmouseenter=\"showArchTooltip('storage',event)\" onmousemove=\"showArchTooltip('storage',event)\" onmouseleave=\"hideArchTooltip()\" style=\"cursor:pointer;transition:fill .2s\" onmouseover=\"this.style.fill='#e8e8e8'\" onmouseout=\"this.style.fill='#ffffff'\" />\n<text x=\"46.84\" y=\"117.08\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"600\" fill=\"#000\" style=\"pointer-events:none\">儲位管理</text>\n<path d=\"M 0 0 L 0.00 180.00 A 180 180 0 0 1 -127.28 127.28 Z\" fill=\"#f8f8f8\" stroke=\"#000\" stroke-width=\"1.5\" onclick=\"openArchModal('order')\" onmouseenter=\"showArchTooltip('order',event)\" onmousemove=\"showArchTooltip('order',event)\" onmouseleave=\"hideArchTooltip()\" style=\"cursor:pointer;transition:fill .2s\" onmouseover=\"this.style.fill='#e8e8e8'\" onmouseout=\"this.style.fill='#f8f8f8'\" />\n<text x=\"-46.84\" y=\"117.08\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"600\" fill=\"#000\" style=\"pointer-events:none\">訂單管理</text>\n<path d=\"M 0 0 L -127.28 127.28 A 180 180 0 0 1 -180.00 0.00 Z\" fill=\"#ffffff\" stroke=\"#000\" stroke-width=\"1.5\" onclick=\"openArchModal('picking')\" onmouseenter=\"showArchTooltip('picking',event)\" onmousemove=\"showArchTooltip('picking',event)\" onmouseleave=\"hideArchTooltip()\" style=\"cursor:pointer;transition:fill .2s\" onmouseover=\"this.style.fill='#e8e8e8'\" onmouseout=\"this.style.fill='#ffffff'\" />\n<text x=\"-113.08\" y=\"50.84\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"600\" fill=\"#000\" style=\"pointer-events:none\">揀貨與配貨</text>\n<path d=\"M 0 0 L -180.00 0.00 A 180 180 0 0 1 -127.28 -127.28 Z\" fill=\"#f8f8f8\" stroke=\"#000\" stroke-width=\"1.5\" onclick=\"openArchModal('qc')\" onmouseenter=\"showArchTooltip('qc',event)\" onmousemove=\"showArchTooltip('qc',event)\" onmouseleave=\"hideArchTooltip()\" style=\"cursor:pointer;transition:fill .2s\" onmouseover=\"this.style.fill='#e8e8e8'\" onmouseout=\"this.style.fill='#f8f8f8'\" />\n<text x=\"-113.08\" y=\"-42.84\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"600\" fill=\"#000\" style=\"pointer-events:none\">品檢包裝</text>\n<path d=\"M 0 0 L -127.28 -127.28 A 180 180 0 0 1 -0.00 -180.00 Z\" fill=\"#ffffff\" stroke=\"#000\" stroke-width=\"1.5\" onclick=\"openArchModal('return')\" onmouseenter=\"showArchTooltip('return',event)\" onmousemove=\"showArchTooltip('return',event)\" onmouseleave=\"hideArchTooltip()\" style=\"cursor:pointer;transition:fill .2s\" onmouseover=\"this.style.fill='#e8e8e8'\" onmouseout=\"this.style.fill='#ffffff'\" />\n<text x=\"-46.84\" y=\"-109.08\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"600\" fill=\"#000\" style=\"pointer-events:none\">退貨管理</text>\n<circle cx=\"0\" cy=\"0\" r=\"55\" fill=\"#000\" />\n<text x=\"0\" y=\"-4\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"bold\" fill=\"#fff\" style=\"pointer-events:none\">WMS 核心</text>\n<text x=\"0\" y=\"14\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"bold\" fill=\"#fff\" style=\"pointer-events:none\">作業流程</text>\n</svg>\n<p style=\"text-align:center;font-size:13px;color:#666;margin:12px 0 0 0\">點擊各流程扇型可查看詳細功能內容</p>\n\n</div>\n\n<div class=\"feat-section\">\n<h4 class=\"feat-section-title\">三大營運管理模組</h4>\n<div class=\"ind-tech-grid\">\n<div class=\"ind-tech-card\"><p class=\"ind-tech-num\">01</p><h5 class=\"ind-tech-title\">商品管理</h5><p class=\"ind-tech-body\">商品主檔、多條碼管理、組合商品、替代品設定、品牌管理、商品分類、自訂屬性</p></div>\n<div class=\"ind-tech-card\"><p class=\"ind-tech-num\">02</p><h5 class=\"ind-tech-title\">看板與報表</h5><p class=\"ind-tech-body\">營運總覽、出貨進度、揀貨進度、入庫進度、自訂看板、訂單統計、人力績效追蹤</p></div>\n<div class=\"ind-tech-card\"><p class=\"ind-tech-num\">03</p><h5 class=\"ind-tech-title\"><a href=\"#\" onclick=\"showSection('feat-13');return false\" class=\"feat-link\">帳務與計費</a></h5><p class=\"ind-tech-body\">進倉計費、倉儲計費、揀貨計費、費率表版本管理、自動化帳單、加值服務計費</p></div>\n</div>\n</div>\n\n<div class=\"feat-section\">\n<h4 class=\"feat-section-title\">四大平台能力</h4>\n<div class=\"ind-tech-grid\" style=\"grid-template-columns:repeat(2,1fr)\">\n<div class=\"ind-tech-card\"><p class=\"ind-tech-num\">01</p><h5 class=\"ind-tech-title\">多貨主管理</h5><p class=\"ind-tech-body\">資料完全隔離、貨主/倉庫端雙介面、角色權限管理、ISO 27001 認證</p></div>\n<div class=\"ind-tech-card\"><p class=\"ind-tech-num\">02</p><h5 class=\"ind-tech-title\"><a href=\"#\" onclick=\"showSection('feat-2');return false\" class=\"feat-link\">行動倉管 APP</a></h5><p class=\"ind-tech-body\">入庫收貨、智慧上架、移儲作業、揀貨、出貨驗收、盤點、多貨主快速切換</p></div>\n<div class=\"ind-tech-card\"><p class=\"ind-tech-num\">03</p><h5 class=\"ind-tech-title\"><a href=\"#\" onclick=\"showSection('feat-14');return false\" class=\"feat-link\">AI 雙引擎（GoBot + Vanta × Claude）</a></h5><p class=\"ind-tech-body\"><strong>GoBot</strong>（系統內建，儲值制）— WMS 側欄直覺助理，支援即時對話、頁面情境感知、檔案上傳分析。<br><br><strong>Vanta × Claude</strong>（外接整合，月費制 NT$99）— AI 裡的 WMS 能力，透過 MCP 深度整合 WMS，在 Claude 任何裝置都能使用。兩者並存互補。</p></div>\n<div class=\"ind-tech-card\"><p class=\"ind-tech-num\">04</p><h5 class=\"ind-tech-title\"><a href=\"#\" onclick=\"showSection('feat-15');return false\" class=\"feat-link\">開放整合平台</a></h5><p class=\"ind-tech-body\">Webhook 事件推播、OAuth 2.0 API、電商平台狀態回寫、即時通知、批次匯入/匯出</p></div>\n</div>\n</div>\n\n<div class=\"feat-section\">\n<h4 class=\"feat-section-title\">想深入了解個別功能？</h4>\n<p style=\"line-height:1.9;color:#333;margin-bottom:16px\">從表格中點選任一功能名稱可直接查看該功能詳情頁。或是直接瀏覽十五大功能的完整列表：</p>\n<div class=\"plan-card-grid\">\n<div class=\"feat-highlight-card click-card\" onclick=\"showSection('feat-1')\" style=\"cursor:pointer\">\n<p class=\"feat-highlight-title\" style=\"font-size:17px\"><strong>十五大功能完整列表 →</strong></p>\n<p class=\"feat-highlight-body\" style=\"font-size:14px\">從全通路訂單自動化、批號效期、QC 雲端錄影到 AI 雙引擎，點入每項功能頁查看詳細痛點、亮點與更多功能。</p>\n</div>\n<div class=\"feat-highlight-card click-card\" onclick=\"showSection('solutions')\" style=\"cursor:pointer\">\n<p class=\"feat-highlight-title\" style=\"font-size:17px\"><strong>四大解決方案總覽 →</strong></p>\n<p class=\"feat-highlight-body\" style=\"font-size:14px\">根據你的營運型態（品牌電商、企業全通路、三方倉、零售連鎖）找到對應方案。</p>\n</div>\n</div>\n</div>\n\n<div class=\"feat-cta\">\n<p class=\"feat-cta-text\">準備好讓倉庫數位化了嗎？</p>\n<a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a>\n</div>\n", "children": []}, {"id": "features", "title": "十五大功能", "html": "", "children": [{"id": "feat-1", "title": "1. 全通路訂單自動化", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">1. 全通路訂單自動化</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">自動串接蝦皮、MOMO、Coupang、Shopline、PChome 等主流電商平台訂單，統一匯入系統後自動分配庫存、安排揀貨出貨流程，從接單到出貨全程系統化管理。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>蝦皮、Momo、官網、門市——每個通路都有訂單湧進來。</li><li>手動下載、逐筆核對、分配庫存、安排物流，光是處理訂單就佔掉大半天。</li><li>一旦漏單或出錯，換來的就是客訴和負評。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 各大電商平台，訂單自動進系統</strong></p><p class=\"feat-highlight-body\">串接 Shopee、Momo、Coupang、ShopLine、LiteShop、MoPlus，訂單即時同步，不用再登入各平台後台手動匯出。設定抓單時段，系統會準時自動執行。非串接平台支援 Excel 批次匯入，或直接在系統手動建單。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 每個通路，各自的出貨規則</strong></p><p class=\"feat-highlight-body\">不同通路對效期、物流、包材要求都不一樣。系統針對每個銷售通路獨立設定：</p><p class=\"feat-highlight-body-sub\">• 效期控管：Momo 要求商品至少還有 6 個月效期才能出貨，設定好，不符合的庫存自動跳過，不怕出到即期品</p><p class=\"feat-highlight-body-sub\">• 物流自動轉換：訂單太大超商放不下、重量超標、寄到離島，系統依材積、重量、郵遞區號自動換成對的物流方式</p><p class=\"feat-highlight-body-sub\">• 揀貨費獨立計價：不同通路的揀貨成本不同，費率各自設定，帳務更清楚</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 滿額贈品、加購品，系統自動處理</strong></p><p class=\"feat-highlight-body\">促銷活動期間，滿 $1,000 送贈品、買 A 商品送試用包——這些規則設定一次，系統在訂單進來時自動加入對應品項。活動結束自動停止，不怕多送也不怕漏送。支援四種觸發條件：訂單金額、訂單重量、商品數量、包含指定商品。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 庫存自動分配，先到期先出</strong></p><p class=\"feat-highlight-body\">訂單成立的瞬間，系統自動依照 FEFO（先到期先出）原則鎖定庫存。採用兩階段機制——先預留、再確認——確保多通路同時湧入訂單時，不會重複扣庫存，杜絕超賣。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong class=\"modified\">5. 庫存數量即時同步各平台（原「庫存數量即時回寫各平台」改寫，強化同步按鈕概念）</strong></p><p class=\"feat-highlight-body\" class=\"modified\">系統提供即時庫存同步功能，可隨時將 WMS 內的實際庫存數量，按照預先設定的比例推送回各電商平台。不僅在入庫時自動同步，管理者也可透過同步按鈕，一鍵將當下最新的庫存狀態更新至所有平台。還能設定安全庫存比例，例如只釋出 80% 的實際庫存到平台上架，預留緩衝空間，避免多平台同時賣到超賣。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">未知商品自動記錄：未建檔品號不擋單，自動暫存待比對</div><div class=\"feat-more-card\">訂單即時攔截：異常訂單一鍵攔截，出貨前即時擋下</div><div class=\"feat-more-card\">智慧拆單出貨：部分缺貨先出有貨的，不讓整張訂單卡住</div><div class=\"feat-more-card\">各大物流商對接：宅配、超商取貨、離島專送一次到位</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-2", "title": "2. 倉庫行動作業 APP", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATUR
