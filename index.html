E</p><h3 class=\"feat-page-title\">2. 倉庫行動作業 APP</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">倉庫行動作業 APP：支援收貨驗收、智慧上架、揀貨導航、品檢核對、行動盤點五大流程。不需要額外採購 PDA 或掃描槍，員工用自己的手機下載 APP 即可完成所有倉庫現場作業。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>倉庫想數位化，第一個念頭就是採購 PDA、架設掃描槍、拉網路線——光設備就是一筆不小的開銷。</li><li>其實不用。不需要額外硬體投資，下載 APP 就能開始數位轉型。</li><li>收貨要回電腦登記、上架要手抄儲位、揀貨拿紙本對照、盤點還在用 Excel——這些全部用一支手機搞定。員工自己的手機就是最好的作業工具。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 收貨驗收，掃碼就完成</strong></p><p class=\"feat-highlight-body\">手機掃描商品條碼，即時核對入庫單的品項與數量。支援批號、效期、製造日期登錄，序號商品可逐一掃碼建立「一機一號」追蹤紀錄。收到的數量不對，當場就能提報差異。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 智慧上架推薦</strong></p><p class=\"feat-highlight-body\">掃完儲位條碼，系統自動推薦最佳存放位置——同品集中、樓層就近、揀貨面優先。不用靠老員工經驗判斷，新人第一天也能放對位置。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 揀貨導航，照著走就對了</strong></p><p class=\"feat-highlight-body\">接到揀貨單，APP 自動依儲位順序排列路線。掃碼確認取貨，數量即時扣減。揀錯品項系統立即警示，不讓錯誤流到下一關。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 品檢核對，逐條掃碼確認</strong></p><p class=\"feat-highlight-body\">掃描出貨單號，叫出品項清單，逐一掃描商品條碼核對。品項、數量全部正確才能完成品檢，少一件、多一件都過不了。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 行動盤點，邊走邊盤</strong></p><p class=\"feat-highlight-body\">盤點任務直接推送到手機，掃描儲位條碼就能開始清點。現場即時回報數量，差異自動標記，不用再抱著紙本回辦公室補登。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">商品即查即改：掃條碼查商品資訊、庫存數量、異動紀錄</div><div class=\"feat-more-card\">儲位移轉：現場掃碼，直接完成庫存搬移換位</div><div class=\"feat-more-card\">即時推播通知：訂單、入庫、庫存異動，重要事件即時推送到手機</div><div class=\"feat-more-card\">多貨主快速切換（三方倉友善！）：同時管理多個貨主，一鍵切換不用重新登入</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div><p style=\"font-size:11px;color:#666;margin-top:16px;font-style:italic\">編輯註：導入手機 APP 後，新人教育訓練時間從 2 週縮短至 2 天，成本減少 70%。</p>"}, {"id": "feat-3", "title": "3. 多層彈性點收", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">3. 多層彈性點收</h3><p class=\"feat-page-sub\" style=\"margin:0\">進貨整板整箱快速點收，出貨逐件成箱靈活核對，系統自動換算數量不出錯。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>供應商送來兩棧板加三箱散貨，你卻得全部拆開一件一件數？</li><li>或者整批簽收不拆箱，等到要出貨才發現數量根本不對？</li><li>收貨點收不該只有「全拆」跟「不拆」兩種選擇。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 進貨點收：板、箱、件自由組合</strong></p><p class=\"feat-highlight-body\">商品建檔時設定包裝規格——每箱幾件、每板幾箱。收貨時按實際狀況輸入：2 板 + 3 箱 + 5 件，系統自動換算總數量，並與入庫單預計數量即時比對差異。不用全部拆開數，也不用手動乘除。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 出貨品檢：掃中箱或大箱條碼，一次核對整箱</strong></p><p class=\"feat-highlight-body\">品檢時掃到中單位條碼，自動計入該箱的件數；掃到大單位條碼，自動計入整板數量。大量出貨不用逐件掃描，成箱出貨一掃就過，品檢效率大幅提升。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 計畫外品項，當場追加</strong></p><p class=\"feat-highlight-body\">供應商多送了沒在單上的商品，直接掃碼新增，系統自動標記為「計畫外品項」，不需要回辦公室改單，也不會搞混原本的入庫計畫。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 差異即時處理，不留隔夜帳</strong></p><p class=\"feat-highlight-body\">點收發現破損、短少，現場直接提報庫存調整，註記原因。不用另外開單、也不用等主管回來處理，異常當下就記錄在案。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 驗收完成，系統告訴你放哪裡</strong></p><p class=\"feat-highlight-body\">上架不靠經驗判斷。系統根據同品集中、樓層就近、揀貨面優先等多重條件，自動推薦最佳儲位。掃碼確認即完成上架，新人第一天就能放對位置。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">手動結案：部分品項未到也能先結案，不卡住後續作業</div><div class=\"feat-more-card\">效期批號一次收齊：點收同步登錄批號、效期、製造日期，序號商品可逐一掃碼追蹤</div><div class=\"feat-more-card\">一鍵全數驗收：品項無誤時，一鍵確認全部到齊</div><div class=\"feat-more-card\">多人同時收貨：同一張入庫單可多位操作員同時點收，不互相卡住</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-4", "title": "4. 智慧儲位管理", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">4. 智慧儲位管理</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">系統依同品集中、樓層就近、揀貨面優先等多重條件自動評分，推薦最佳儲位 Top 5。支援虛擬、固定、動態三種倉儲模式與五種溫層分區，從小型倉庫到大型冷鏈倉都適用。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>新品進來不知道該放哪，老員工憑記憶擺、新人隨便塞。</li><li>同一個商品散落在倉庫各個角落，揀貨要跑好幾趟才撿得齊。</li><li>儲位管理靠人腦記，一旦有人請假，整個倉庫就亂了。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 智慧上架推薦，系統幫你選位置</strong></p><p class=\"feat-highlight-body\">商品驗收完成後，系統自動根據多重條件評分，推薦最佳儲位 Top 5。評分邏輯包含：同品集中（+100）、預設儲位（+50）、鄰近同商品（+30）、關聯商品（+20~50）、同品類（+15）、同貨主（+10）。不靠經驗判斷，新人第一天也能放對位置。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 三種倉儲模式，配合你的管理方式</strong></p><p class=\"feat-highlight-body\">不是每間倉庫都需要複雜的儲位邏輯。系統提供三種模式自由切換：</p><p class=\"feat-highlight-body-sub\">• 虛擬模式：不管儲位，驗收完成自動入帳，適合小型倉庫快速起步</p><p class=\"feat-highlight-body-sub\">• 固定模式：每個商品指定專屬儲位，驗收後自動上架到位，適合品項固定的倉庫</p><p class=\"feat-highlight-body-sub\">• 動態模式：驗收後先暫存收貨區，由操作員搭配智慧推薦選擇儲位，適合大型倉庫靈活運用空間</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 揀貨面優先，地面層先走</strong></p><p class=\"feat-highlight-body\">系統自動排列揀貨順序：優先從揀貨面取貨、地面層優先於高層、少量儲位先清空，再依走道動線排列。操作員照順序走就好，不用來回繞路，也不用頻繁操作堆高機。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 五種溫層分區，冷鏈不混放</strong></p><p class=\"feat-highlight-body\">每個儲位可標記溫層——常溫、恆溫、冷藏、冷凍、空調。上架時系統自動比對商品與儲位的溫層是否一致，不符合直接擋掉，從源頭杜絕冷鏈商品被放到常溫區。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 儲位異動全程追蹤</strong></p><p class=\"feat-highlight-body\">每一次移轉、上架、揀貨、盤點調整，系統都留下完整紀錄——誰移的、從哪移到哪、移了多少。支援依日期、商品、儲位、操作來源篩選查詢，庫存對不上時有跡可循。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">儲位鎖定：特定儲位暫停進出貨操作，盤點或維護期間不怕誤動</div><div class=\"feat-more-card\">分區管理：倉庫可劃分多個區域，儲位依區歸組，管理更有條理</div><div class=\"feat-more-card\">掃碼移轉：現場掃描儲位條碼，直接完成庫存搬移換位</div><div class=\"feat-more-card\">儲位類型自訂：依實際需求自訂儲位類型，不同類型可設定不同倉租費率</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-5", "title": "5. 批號效期管理", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">5. 批號效期管理</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">系統自動追蹤每批商品的製造日期與有效期限，依 FEFO（先到期先出）原則自動分配出貨庫存。支援每個銷售通路獨立設定效期門檻，不符合的批次自動跳過，確保出貨合規。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>食品、保健品、美妝——效期管理做不好，輕則客訴退貨，重則違規下架。</li><li>靠人工記錄批號、用 Excel 追效期，等到發現快過期，商品早已出到客人手上。</li><li>不同通路對效期要求還不一樣，Momo 要六個月、官網可以三個月，人工根本管不住。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 先到期先出（FEFO），系統自動分配</strong></p><p class=\"feat-highlight-body\">訂單成立時，系統自動從最接近到期的批次開始分配庫存。不需要人工挑選哪一批先出，從根本上避免舊貨被壓在倉庫裡放到過期。沒有效期的商品則依先進先出（FIFO）處理。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 每個通路，各自的效期門檻</strong></p><p class=\"feat-highlight-body\">Momo 要求至少剩 180 天、蝦皮要 90 天、官網不限——每個銷售通路可獨立設定效期規則。系統在分配庫存時自動過濾，不符合門檻的批次直接跳過，不會出到不該出的通路。支援「依天數」和「依效期比例」兩種設定方式，海外進口商品還能套用獨立規則。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 智慧日期補齊，少填一個就好</strong></p><p class=\"feat-highlight-body\">商品設定好保質期天數後，收貨時只需輸入製造日期或到期日其中一個，系統自動推算另一個。省掉重複輸入，也避免人工計算出錯。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 同批同效期出貨，避免客訴</strong></p><p class=\"feat-highlight-body\">部分通路或客戶要求同一張訂單內的商品必須是同一批次、同一效期。開啟設定後，系統只會從單一批次分配，湊不齊就不出，確保客人收到的每一件效期都一致。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 效期預警，過期前主動通知</strong></p><p class=\"feat-highlight-body\">可依貨主和庫存類型設定預警天數。商品即將到期時，系統自動產生告警，讓你有時間安排促銷出清或退回供應商，不再等到過期才發現。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">批號強制追蹤：特定商品可設為批號必填，收貨時未填批號無法通過驗收</div><div class=\"feat-more-card\">歷史效期追蹤：記錄每個通路每個商品上次出貨的效期，確保本次出貨不低於上次標準</div><div class=\"feat-more-card\">批次溯源：開啟溯源模式後，每筆庫存可追溯至原始入庫單，完整還原進貨來源</div><div class=\"feat-more-card\">彈性分配模式：可切換嚴格模式（效期完全吻合）或彈性模式（效期大於等於即可），依業務需求調整</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-6", "title": "6. QC 即時印標", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">6. QC 即時印標</h3><p class=\"feat-page-sub\" style=\"margin:0\">掃碼品檢、裝箱封包、列印標籤，一站完成不換系統。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>品檢完還要切到另一個系統印標籤，印完再回來改狀態。</li><li>一張出貨單經手三套工具，流程斷點多，出錯的機會也多。</li><li>旺季出貨量暴增，每多一個步驟就是多一倍的等待。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 掃碼品檢，逐件核對不漏發</strong></p><p class=\"feat-highlight-body\">掃描出貨單號進入品檢，逐一掃描商品條碼核對品項與數量。支援大、中、小單位條碼掃描，成箱出貨一掃抵多件。品項或數量不對，系統當場攔截。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 序號商品，掃碼即綁定</strong></p><p class=\"feat-highlight-body\">需要追蹤序號的商品（3C、精品、醫材），品檢時逐一掃描序號，系統自動綁定到該筆出貨。支援整箱序號一次掃入（以分隔符號拆分），不用逐支手打。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 多箱裝箱，自動分包</strong></p><p class=\"feat-highlight-body\">一張出貨單商品太多，一箱裝不下，每按一次「新增箱數」就建立新包裹，系統自動記錄每箱裝了什麼品項、多少數量。超材不卡關，分箱出貨也清清楚楚。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 品檢完成即印標，一氣呵成</strong></p><p class=\"feat-highlight-body\">品檢通過後，系統自動串接物流商 API 取號並產出出貨標籤，直接列印。不用切換系統、不用手動填單號。支援超過十家物流商直接對接，宅配、超取標籤格式全自動處理。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. QC 鎖定，防止重複品檢</strong></p><p class=\"feat-highlight-body\">一張出貨單同時只允許一位操作員品檢。系統自動鎖定，其他人掃到同一張單會提示「已被某人鎖定」，避免兩人重複作業或互相覆蓋進度。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">包材記錄：品檢時可記錄使用的箱型、膠帶等包材，掌握耗材用量</div><div class=\"feat-more-card\">包裹秤重：每箱可登記實際重量與尺寸，物流計費更精準</div><div class=\"feat-more-card\">揀貨單列印：品檢前可先產出裝箱明細 PDF，支援自訂模板與紙張大小</div><div class=\"feat-more-card\">接管品檢：前一位操作員中斷，一鍵接管繼續品檢，進度不會遺失</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-7", "title": "7. QC 雲端錄影", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">7. QC 雲端錄影</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">品檢時系統自動啟動鏡頭錄影，掃碼品項即時疊加在畫面上。影片自動上傳雲端，依出貨單號歸檔。收到客訴時，輸入單號即可調閱當時的品檢影片，出貨錯誤率降至 0.01%。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>客人說少了一件、說收到的商品有破損——但倉庫明明檢查過了，怎麼證明？</li><li>裝監視器，角度拍不到桌面細節。用手機另外錄，操作員兩隻手都在忙。</li><li>沒有影像紀錄，每次客訴都變成各說各話。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 品檢同時自動錄影，不需額外操作</strong></p><p class=\"feat-highlight-body\">操作員進入品檢畫面，系統自動啟動鏡頭開始錄影。掃碼、核對、裝箱的過程全程記錄，操作員不用多按任何按鈕，雙手專心品檢就好。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 掃到什麼，畫面就顯示什麼</strong></p><p class=\"feat-highlight-body\">每掃一件商品，品名和數量即時疊加在錄影畫面上。事後調閱影片時，不用猜「這一刻在掃哪個商品」，影像和品項資訊完全同步，舉證更有力。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 品檢完成，自動倒數停止錄影</strong></p><p class=\"feat-highlight-body\">品檢標記完成後，系統自動進入 60 秒倒數，讓操作員完成封箱動作後才停止錄影。最後的封箱過程也能完整保留，不怕畫面提前中斷。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 影片自動上傳雲端，不佔本機空間</strong></p><p class=\"feat-highlight-body\">錄影完成後，系統自動將影片上傳至雲端儲存，依出貨單號歸檔。不佔用電腦硬碟空間，不怕檔案遺失。需要調閱時，直接在系統內依單號查詢、線上觀看或下載。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 退貨驗收也能錄</strong></p><p class=\"feat-highlight-body\">不只出貨品檢，退貨驗收同樣支援錄影。客人退回的商品狀態如何、有沒有損壞，打開包裹的過程全程記錄，退貨爭議也有影像佐證。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">上傳進度即時顯示：上傳中、等待中、已完成、失敗重試，每段影片的狀態一目了然</div><div class=\"feat-more-card\">安全簽章連結：影片透過限時簽章連結存取，未授權無法觀看，保障資料安全</div><div class=\"feat-more-card\">多箱分段錄影：一張出貨單多箱包裝時，每箱自動分段錄影，方便精準調閱</div><div class=\"feat-more-card\">不需額外硬體：使用電腦內建鏡頭或 USB 攝影機即可，不需採購專業錄影設備</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-8", "title": "8. 揀貨模組", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">8. 揀貨模組</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">波次揀貨將多筆訂單依物流方式、通路、地區自動分組，合併相同商品一次揀齊，再透過配貨模組分回各訂單。導入後平均出貨速度提升 200-300%。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>訂單一多，揀貨路線亂七八糟，同一條走道來回走好幾趟。</li><li>揀完還要人工對照哪張訂單分到哪個格位，分錯了整批重來。</li><li>旺季靠加人頭撐，但新人不熟路線，效率怎麼都上不去。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 波次揀貨，多單合揀效率翻倍</strong></p><p class=\"feat-highlight-body\">系統自動將多筆訂單依物流方式、銷售通路、收件地區等條件分組成波次，合併相同商品一次揀齊。不用一張訂單跑一趟，五十張單的商品可能一趟就揀完。還能設定揀貨排程，時間一到系統自動建單，不需人工操作。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 路線自動排序，照著走就對了</strong></p><p class=\"feat-highlight-body\">揀貨清單自動依儲位順序排列：揀貨面優先、地面層先走、少量儲位先清空，再沿走道動線排列。操作員從頭到尾順著走，不用來回繞路，也減少操作堆高機的次數。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 手機揀貨或紙本揀貨，兩種模式自由選</strong></p><p class=\"feat-highlight-body-sub\">• 手機模式：APP 即時顯示下一個要去的儲位，掃碼確認取貨，揀錯品項系統立即警示</p><p class=\"feat-highlight-body-sub\">• 紙本模式：列印揀貨單，操作員按表操作，完成後回系統一次確認，可回報實際差異</p><p class=\"feat-highlight-body\">不同倉庫、不同團隊可以用不同方式，不強迫全部統一。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 配貨分揀，即時同步不出錯</strong></p><p class=\"feat-highlight-body\">揀完的商品要分回各自訂單，掃描商品條碼，系統自動指示放到哪一格。多人同時配貨時，透過即時同步讓所有操作員看到彼此的進度。遇到不在波次內的商品，開啟異常品處理模式，系統自動歸入待處理區，不中斷配貨流程。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 揀貨不足？系統自動處理</strong></p><p class=\"feat-highlight-body\">揀到一半發現儲位上的貨不夠，紙本模式可在確認時直接回報短缺數量，系統自動釋放多餘的庫存分配、調整出貨單狀態。不用手動改單，也不會鎖住其他訂單的庫存。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">揀貨歸位：揀錯或多揀的商品，掃碼退回原儲位，系統自動建議歸還位置</div><div class=\"feat-more-card\">波次標籤批量列印：整個波次的物流標籤一鍵取號、一次列印，不用逐張處理</div><div class=\"feat-more-card\">揀貨排程自動化：設定固定時段，系統自動從待出貨訂單建立揀貨單，全程免人工</div><div class=\"feat-more-card\">揀貨預設範本：常用的分組規則、數量上限存成範本，下次一鍵套用</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-9", "title": "9. 配貨功能", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">9. 配貨功能</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">波次揀貨完成後，掃描商品條碼，系統自動比對訂單並指示放入對應格位。支援多人同時配貨、即時進度同步、語音播報格位編號，配貨錯誤率趨近於零。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>波次揀貨把多張訂單的商品一起揀回來了，接下來要分回各自的訂單。</li><li>靠人工對照單號一張一張分？慢、容易分錯，旺季更是噩夢。</li><li>兩個人同時配貨，還可能互相覆蓋進度，重複放或漏放都不知道。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 掃碼自動配對，直接告訴你放哪格</strong></p><p class=\"feat-highlight-body\">掃描商品條碼，系統自動比對波次內所有訂單，即時指示放到第幾號格位。支援條碼、SKU、批號多種比對方式，同一商品出現在多張訂單時，系統自動分配到尚未完成的格位，不需要人工判斷。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 格位看板即時同步，多人協作不衝突</strong></p><p class=\"feat-highlight-body\">配貨畫面以格狀看板呈現，每一格代表一張訂單。多位操作員同時作業時，所有人的掃碼進度透過即時同步在畫面上更新。誰掃了什麼、哪一格還差幾件，全場同步可見，不會重複配或漏配。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 語音播報 + 彈窗訊息，抬頭就知道放哪裡</strong></p><p class=\"feat-highlight-body\">掃碼後系統自動語音播報「配貨第 3 號」，雙手不用離開商品。倉庫太吵聽不清，開啟彈窗訊息模式，格位編號以全螢幕動畫顯示，抬頭一眼就能確認，訂單完成時還會變綠色提示。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 異常品處理模式，不中斷配貨節奏</strong></p><p class=\"feat-highlight-body\">掃到不在這批波次裡的商品怎麼辦，開啟異常品處理模式，系統自動將未匹配商品歸入空格位暫存，並嘗試查詢商品資訊。配貨流程不中斷，異常品事後統一處理。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 自訂格位數量，配合實際場地</strong></p><p class=\"feat-highlight-body\">格位看板的行列數可自由調整（2×2 到 10×10），依照現場分配貨架的格數設定。不管是小型分配貨台還是大型分揀牆，畫面都能對應實際空間。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">一鍵清除重來：配貨出狀況需要重來，輸入確認文字後一鍵清除所有進度，重新開始</div><div class=\"feat-more-card\">訂單明細速查：點擊任一格位，展開該訂單完整品項清單與配貨進度</div><div class=\"feat-more-card\">波次快速載入：掃描波次單號、出貨單號或直接輸入編號，三種方式都能快速進入配貨</div><div class=\"feat-more-card\">配貨紀錄保留：所有掃碼事件自動保留 24 小時,中途斷線重新連入也不會遺失進度</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-10", "title": "10. 盤點功能", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">10. 盤點功能</h3><p class=\"feat-page-sub\" style=\"margin:0\">明盤、盲盤、動態、靜態，盤點方式由你決定，差異系統自動處理。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>每次盤點就像打仗——全倉停工、人工數貨、手抄數字、回辦公室登 Excel。</li><li>盤完發現有差異，還要一筆一筆查是多了還是少了，再手動調帳。</li><li>盤點做得越少越心虛，做得越多越耗人力，兩頭為難。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 動態盤點 vs 靜態盤點，兩種模式自由選</strong></p><p class=\"feat-highlight-body-sub\">• 動態盤點：不需事先快照，現場掃到什麼就盤什麼，適合日常小範圍抽盤</p><p class=\"feat-highlight-body-sub\">• 靜態盤點：系統先凍結庫存快照，再逐一核對，適合月底全倉大盤</p><p class=\"feat-highlight-body\">不同場景用不同方式，不用每次都全倉停機。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 明盤 vs 盲盤，依需求切換</strong></p><p class=\"feat-highlight-body-sub\">• 明盤：操作員可以看到系統庫存數量，直接比對差異</p><p class=\"feat-highlight-body-sub\">• 盲盤：系統隱藏庫存數字，操作員只能填入實際數量，避免「照著系統抄」的慣性錯誤</p><p class=\"feat-highlight-body\">盲盤讓盤點結果更真實，適合高價值商品或稽核場景。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 手機掃碼現場盤，不用抱紙本回辦公室</strong></p><p class=\"feat-highlight-body\">操作員用手機 APP 掃描儲位條碼，畫面列出該儲位所有品項，逐一填入實際數量。盤完一格就送出一格，不用等全部盤完才回傳。支援初盤、複盤兩階段確認，確保數據可靠。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 差異自動計算，一鍵調帳</strong></p><p class=\"feat-highlight-body\">系統自動比對帳面數量與實盤數量，盤盈、盤虧一目了然。確認無誤後一鍵結案，系統自動產生庫存異動紀錄調整帳務，不需要手動開調整單。沒有被盤到的品項，系統自動標記為遺漏並歸零處理。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 指定貨主範圍盤點</strong></p><p class=\"feat-highlight-body\">三方倉同一個儲位可能混放不同貨主的商品。建立盤點單時可指定特定貨主，系統只列出該貨主的庫存項目，不會牽涉到其他貨主的資料。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">盤點結果匯出入：盤點項目可匯出 Excel 離線作業，也能匯入填好的結果批次更新</div><div class=\"feat-more-card\">結案可撤銷：發現盤點有誤，結案後仍可撤銷，系統自動反轉庫存異動</div><div class=\"feat-more-card\">靜態快照自動重試：靜態模式快照失敗時，系統自動重試最多三次，確保資料完整</div><div class=\"feat-more-card\">工時自動記錄：每次盤點操作自動記錄操作員工時，方便績效統計</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-11", "title": "11. 耗材管理", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">11. 耗材管理</h3><p class=\"feat-page-sub\" style=\"margin:0\">每一箱用了什麼包材，系統自動記錄，成本清楚可追溯。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>紙箱、氣泡袋、膠帶，每天用掉多少根本沒在追蹤。</li><li>月底盤點耗材才發現庫存見底，臨時叫貨來不及。</li><li>不同通路該用什麼箱型也沒有規範，員工隨手拿、大箱裝小貨，包材浪費嚴重。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 耗材建檔，尺寸重量一次設定</strong></p><p class=\"feat-highlight-body\">每種包材（紙箱、氣泡袋、填充物等）建立獨立檔案，登記條碼、尺寸、重量與成本。物流商取號時，系統自動帶入包材的長寬高與重量，不用每次手動填寫，運費計算更精準。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 品檢裝箱即記錄用量</strong></p><p class=\"feat-highlight-body\">操作員品檢裝箱時，選擇使用的包材，系統自動將耗材綁定到該包裹。每一箱用了什麼箱型、多少填充材，全部記錄在案，事後可按出貨單、日期、貨主查詢用量。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 通路指定箱型，出貨包裝標準化</strong></p><p class=\"feat-highlight-body\">不同銷售通路可以綁定專用耗材——蝦皮訂單用 A 箱、Momo 用 B 箱。品檢時系統自動帶出對應通路的包材選項，避免操作員自行判斷，確保每個通路的包裝規格一致。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 低庫存預警，補貨不再臨時抱佛腳</strong></p><p class=\"feat-highlight-body\">每種耗材可設定安全庫存數量，庫存低於門檻時系統自動提醒。提前備貨，不會等到紙箱用完才發現要叫貨。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 多貨主耗材獨立管理</strong></p><p class=\"feat-highlight-body\">三方倉的不同貨主可能使用各自的專屬包材。系統支援貨主層級的耗材建檔，也支援倉庫通用耗材，兩者並存不衝突。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">耗材條碼掃描：每種包材設定獨立條碼，品檢時掃碼快速選取</div><div class=\"feat-more-card\">材積自動計算：依耗材尺寸自動計算體積，支援立方公尺與立方英尺兩種單位</div><div class=\"feat-more-card\">耗材儲位管理：記錄每種包材的存放位置，方便操作員快速取用</div><div class=\"feat-more-card\">貨主端同步管理：貨主可在自己的後台管理專屬耗材資料，不需透過倉庫代操作</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-12", "title": "12. 安全庫存與判定補貨", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">12. 安全庫存與判定補貨</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">系統提供數量門檻、週轉天數、滯銷天數三種庫存監控機制，搭配紅黃綠健康度儀表板，即時掌握所有商品的庫存狀態。庫存低於安全水位時自動告警，補貨入庫後自動解除，全程不需人工監看。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>每天忙著出貨，等到客人下單才發現沒貨了。</li><li>庫存太多壓資金，太少又斷貨，靠感覺補貨永遠抓不準。</li><li>不同商品週轉速度不同，用同一套標準管根本管不住。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 三種監控機制，適應不同商品特性</strong></p><p class=\"feat-highlight-body\">不是所有商品都適合用同一種方式判斷是否該補貨。系統提供三種監控機制：</p><p class=\"feat-highlight-body-sub\">• 數量門檻：庫存低於設定數量即告警，適合穩定銷售的基本款</p><p class=\"feat-highlight-body-sub\">• 週轉天數：根據近期平均銷量預估剩餘可賣天數，適合銷量波動大的商品</p><p class=\"feat-highlight-body-sub\">• 滯銷天數：超過指定天數沒有出貨異動，自動標記為滯銷品，提醒處理</p><p class=\"feat-highlight-body\">每個商品、每種庫存類型都能設定獨立的監控規則。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 健康度儀表板，紅黃綠一目了然</strong></p><p class=\"feat-highlight-body\">每個商品的庫存狀態自動計算健康比率，分為健康、警告、危險三個等級。打開監控看板，哪些品項即將斷貨、哪些積壓過多，不用逐筆查庫存就能掌握全貌。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 效期到期提前通知</strong></p><p class=\"feat-highlight-body\">可依貨主和庫存類型設定效期預警天數。商品即將超過出貨門檻時，系統自動發送站內通知與 Email 提醒，讓你有時間安排促銷出清或退回供應商，不再等到過期才發現。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong class=\"modified\">4. 電商庫存即時同步，安全水位保留緩衝（原「電商庫存自動同步」改寫，強化同步按鈕概念）</strong></p><p class=\"feat-highlight-body\" class=\"modified\">系統提供即時庫存同步功能，管理者可隨時透過同步按鈕，將 WMS 內的當前實際庫存數量，按照預先設定的比例推送回各電商平台。除了入庫時自動觸發同步外，任何庫存異動（盤點調整、退貨入庫、手動調帳等）後也能主動同步，確保各平台顯示的可售數量隨時與實際庫存一致。可設定釋出比例（例如只同步 80% 的實際庫存），預留安全緩衝。商品也能設定電商安全庫存底線，低於門檻自動停止同步。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 告警自動觸發與解除</strong></p><p class=\"feat-highlight-body\">庫存低於門檻時自動產生告警，補貨入庫後庫存回到安全水位，告警自動解除。不需要人工監看、也不需要手動關閉通知，系統持續自動判斷。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">效期過濾監控：監控可設定只追蹤效期大於 N 天的庫存，即期品不納入可售計算</div><div class=\"feat-more-card\">庫存快照匯出：每日庫存狀態自動留存，可匯出歷史快照進行趨勢分析</div><div class=\"feat-more-card\">多庫存類型獨立監控：良品、瑕疵品、退貨品各自設定監控規則，不混在一起判斷</div><div class=\"feat-more-card\">滯銷品自動標記：長期無異動的庫存自動浮出，提醒你該處理的不只是缺貨，還有積壓</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-13", "title": "13. 自動化帳務系統", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">13. 自動化帳務系統</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">專為三方倉（3PL）設計的自動化計費系統，提供七種倉租計費模式，支援入庫費、倉儲費、揀貨費自動結算。費率卡支援版本管理，調價不影響歷史帳目。每月帳單自動歸集，貨主可在自己的後台查看明細，對帳透明不需來回確認。</p></div><div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>三方倉最頭痛的不是作業，而是每個月的對帳。</li><li>哪個貨主用了幾個儲位、進了幾板貨、出了幾件貨，全靠 Excel 手動整理。</li><li>算錯被客戶質疑、算少自己吃虧，帳務糾紛永遠是客戶關係的隱形殺手。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>1. 七種倉租計費模式，對應各種收費邏輯</strong></p><p class=\"feat-highlight-body\">不同貨主的計費方式可能完全不同。系統提供七種倉租模式，依貨主需求各自設定：</p><p class=\"feat-highlight-body-sub\">• 依儲位類型計費：不同架型不同價格，算佔了幾格</p><p class=\"feat-highlight-body-sub\">• 逐品計板：每個品項各自無條件進位成板數，適合嚴格計費</p><p class=\"feat-highlight-body-sub\">• 合計計板：所有品項先加總再進位，適合混板計費</p><p class=\"feat-highlight-body-sub\">• 依材積計費：按商品實際體積計算</p><p class=\"feat-highlight-body-sub\">• 依重量計費：按商品實際重量計算</p><p class=\"feat-highlight-body-sub\">• 依件數計費：最單純，算總件數乘以單價</p><p class=\"feat-highlight-body-sub\">• 不計倉租：促銷期或特殊合約免倉租</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>2. 入庫費用自動結算</strong></p><p class=\"feat-highlight-body\">入庫作業完成的瞬間，系統自動依費率卡計算入庫費用——基本費、棧板費、箱數費、件數費疊加計算。明細自動寫入當月帳單，不需要人工統計，也不怕漏算。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>3. 費率卡版本管理，調價不影響舊帳</strong></p><p class=\"feat-highlight-body\">每位貨主的費率卡支援多版本管理，設定生效日期後系統自動切換。調價前的帳單依舊版計算，調價後的帳單依新版計算，歷史帳目完整保留，合約變更有據可查。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>4. 通路別揀貨費率獨立設定</strong></p><p class=\"feat-highlight-body\">同一個貨主，不同銷售通路的揀貨費可能不同。系統支援通路層級覆寫費率，Momo 的揀貨費和蝦皮可以各自設定，帳務自動拆分計算。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>5. 帳單狀態管理，從開立到請款一條龍</strong></p><p class=\"feat-highlight-body\">每月帳單自動歸集所有費用項目，支援三階段狀態管理：開放（持續累計）→ 結帳（鎖定金額）→ 已開票（完成請款）。需要手動調整，可直接新增調整項目，系統自動重算總額。</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">每日倉租自動計算：系統每天自動執行倉租快照，逐日累計不遺漏</div><div class=\"feat-more-card\">手動調整項目：特殊費用（加班費、耗材費等）可手動新增，併入同一張帳單</div><div class=\"feat-more-card\">貨主端帳單查詢：貨主可在自己的後台查看帳單明細，對帳透明不需來回確認</div><div class=\"feat-more-card\">費用明細完整拆解：每筆費用保留完整計算過程（幾板、幾箱、幾件），貨主有疑問隨時調閱</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div>"}, {"id": "feat-14", "title": "14. AI 雙引擎（GoBot + Vanta × Claude）", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">14. AI 雙引擎（GoBot + Vanta × Claude）</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">AI 雙引擎：內建直覺 × 外接隨身，依場景自由搭配。GoWarehouse 同時提供兩套 AI 能力——系統內建的 GoBot（儲值制）與外接整合的 Vanta × Claude（月費制）。兩者不是替代關係，而是互補：GoBot 站在 WMS 後台，側欄一開就能問，直覺又即時；Vanta × Claude 站在 Claude 裡，在桌面、手機、團隊版任何地方都能隨身使用 WMS 能力。依你的使用場景自由搭配。</p></div>\n<div style=\"background:#f5f5f5;border-radius:12px;padding:20px;margin:16px 0\">\n<h4 style=\"margin:0 0 4px 0;color:#000;font-size:15px\">雙引擎總覽</h4>\n<p style=\"font-size:13px;color:#666;margin:0 0 14px 0\">內建直覺 × 外接隨身，依使用場景自由搭配</p>\n<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n\n<div style=\"background:#fafafa;border:1px solid #d4d4d4;border-radius:10px;padding:16px 18px\">\n<span style=\"display:inline-block;background:#000;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600\">系統內建</span>\n<h5 style=\"margin:8px 0 4px 0;color:#000;font-size:17px\">GoBot</h5>\n<p style=\"font-size:12px;color:#666;margin:2px 0 10px 0\">WMS 側欄的直覺助理</p>\n<ul style=\"font-size:12px;color:#444;margin:0 0 0 16px;line-height:1.7\">\n<li>倉管、揀貨員在 WMS 後台直接對話</li>\n<li>自動感知當前頁面情境</li>\n<li>支援 Excel、PDF 檔案上傳即時解讀</li>\n</ul>\n</div>\n\n<div style=\"background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);border:1px solid #f59e0b;border-radius:10px;padding:16px 18px\">\n<span style=\"display:inline-block;background:#b45309;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600\">外接整合</span>\n<h5 style=\"margin:8px 0 4px 0;color:#b45309;font-size:17px\">Vanta × Claude</h5>\n<p style=\"font-size:12px;color:#78350f;margin:2px 0 10px 0\">AI 裡的 WMS 能力，不用登入後台</p>\n<ul style=\"font-size:12px;color:#78350f;margin:0 0 0 16px;line-height:1.7\">\n<li>在 Claude 桌面、手機、團隊版任何地方使用</li>\n<li>MCP 深度整合，原生呼叫與執行</li>\n<li>一句話跨步驟完成複雜倉務</li>\n</ul>\n</div>\n\n</div>\n</div>\n<div class=\"feat-section feat-pain\"><h4 class=\"feat-section-title\">產業痛點</h4><ul class=\"feat-pain-list\"><li>倉管人員整天待在 WMS 後台，查儲位、查庫存、查出貨狀態。如果每次都要切頁面或開外部工具，效率直接打折。</li><li>老闆或業務不常登入 WMS，但會臨時想問「這批貨還剩多少」「這個月帳單多少」——為了一個小問題開瀏覽器、登入系統太麻煩。</li><li>想做「把今天所有 Momo 訂單改成宅配、再把這三張出貨單合併成一個波次」這類多步驟操作，在傳統後台要點二十幾下，出錯機率也高。</li></ul></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong class=\"modified\">1. GoBot（系統內建，儲值制）— WMS 裡的直覺助理</strong></p><p class=\"feat-highlight-body\" class=\"modified\">登入 WMS 後側欄一開就能對話，不需切任何系統</p><p class=\"feat-highlight-body\" class=\"modified\">會自動感知當前頁面情境（你在看哪張訂單，GoBot 就知道你要問什麼）</p><p class=\"feat-highlight-body\" class=\"modified\">支援 Excel、PDF 檔案上傳即時解讀，協助批次匯入訂單</p><p class=\"feat-highlight-body\" class=\"modified\">依 token 用量計費（儲值制），用多少算多少，彈性且不綁約</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong class=\"modified\">2. Vanta × Claude（外接整合，月費制）— AI 裡的 WMS 能力</strong></p><p class=\"feat-highlight-body\" class=\"modified\">不用登入後台，在 Claude 桌面版、手機版、團隊版哪裡都能用</p><p class=\"feat-highlight-body\" class=\"modified\">透過 MCP（Model Context Protocol）深度整合 WMS，原生呼叫、原生回應</p><p class=\"feat-highlight-body\" class=\"modified\">一句「今天 Momo 還有幾張單沒出？」就能在 Claude 裡直接得到答案</p><p class=\"feat-highlight-body\" class=\"modified\">月費 NT$99 訂閱啟用整合能力（另需 Claude 訂閱），之後使用量在 Claude 訂閱內</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong class=\"modified\">3. 兩套各有直覺優勢，依場景自由選擇</strong></p><p class=\"feat-highlight-body-sub\">• 全天待在 WMS 後台的倉管、揀貨員 → GoBot 最順手，側欄一開不用切</p><p class=\"feat-highlight-body-sub\">• 老闆、業務、會計只想臨時問一下 → Vanta × Claude 不用登入最快</p><p class=\"feat-highlight-body-sub\">• 想跑複雜跨步驟流程、自動化報表 → Vanta × Claude 的 MCP 能力更強</p><p class=\"feat-highlight-body-sub\">• 客戶端貨主自助查詢 → GoBot 成本可控、方便追蹤使用量</p><p class=\"feat-highlight-body\" class=\"modified\">兩套可同時啟用，彼此不衝突。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong class=\"modified\">4. 權限與資料完全同步 WMS，雙引擎一致</strong></p><p class=\"feat-highlight-body\" class=\"modified\">GoBot 與 Vanta × Claude 皆透過你在 WMS 的帳號授權，存取範圍與權限與後台一致。貨主 A 的帳號只能看到貨主 A 的資料；操作員沒有刪除權限 AI 也不會幫你刪。資料不外流、不跨貨主、不越權。</p></div><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong class=\"modified\">5. 多輪對話、檔案分析、角色感知</strong></p><p class=\"feat-highlight-body\" class=\"modified\">兩套 AI 都支援多輪對話與檔案上傳（Excel、PDF）</p><p class=\"feat-highlight-body\" class=\"modified\">GoBot 對話紀錄留在 WMS 內，依貨主歸檔、方便稽核</p><p class=\"feat-highlight-body\" class=\"modified\">Vanta × Claude 對話紀錄跟著 Claude 帳號，跨裝置同步</p><p class=\"feat-highlight-body\" class=\"modified\">依使用者身份自動調整回應（老闆看報表、揀貨員看儲位、會計看帳單）</p></div></div></div><div class=\"feat-section feat-more\"><h4 class=\"feat-section-title\">更多功能</h4><div class=\"feat-more-list\"><div class=\"feat-more-card\">計費方式對照：GoBot 儲值制（用多少算多少）/ Vanta × Claude 月費制 NT$99（另需 Claude 訂閱）</div><div class=\"feat-more-card\">視覺識別：GoBot 帶 sparkle 圖示於 WMS 側欄；Vanta × Claude 於 Claude 原生介面使用</div><div class=\"feat-more-card\">AI 用量管理：貨主層級可設定每日 token 預算上限，避免意外超支（GoBot）</div><div class=\"feat-more-card\">安全與稽核：兩套 AI 的所有操作紀錄皆可追溯，符合 ISO 27001 資安要求</div></div></div><div class=\"feat-cta\"><p class=\"feat-cta-text\">準備好為你的倉庫升級了嗎？</p><a href=\"#\" onclick=\"showSection('pricing');return false\" class=\"feat-cta-btn\">前往訂閱方案</a></div><p style=\"font-size:11px;color:#666;margin-top:16px;font-style:italic\">編輯註： AEO 重寫：從單一 AI chatbot 改為「AI 雙引擎」定位（GoBot 儲值制 + Vanta × Claude 月費制 NT$99），補痛點 + 重寫亮點</p>"}, {"id": "feat-15", "title": "15. 開放整合平台", "html": "<div class=\"feat-hero\"><p class=\"feat-page-tag\">FEATURE</p><h3 class=\"feat-page-title\">15. 開放整合平台</h3><p class=\"feat-page-sub\" style=\"margin:0;background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;display:inline-block\">提供 Webhook 事件推播與 OAuth 2.0 API，支援訂單、商品、入庫、庫存、出貨、退貨等事件即時推送至外部系統。出貨狀態自動回寫電商平台，支援批次匯入/匯出與完整 API 日誌稽核。</p></div><div class=\"feat-section\"><h4 class=\"feat-section-title\">核心亮點</h4><div class=\"feat-highlight-list\"><div class=\"feat-highlight-card\"><p class=\"feat-highlight-title\"><strong>Webhook 事件推播</strong></p><p class=\"feat-highlight-body\">支援訂單、商品、入庫 >\n<tr><td>倉庫廣播通知</td><td class=\"n\">✗</td><td class=\"y\">✓</td><td class=\"y\">✓</td></tr>\n<tr><td>IP 白名單 / 物流類型自訂</td><td class=\"n\">✗</td><td class=\"y\">✓</td><td class=\"y\">✓</td></tr>\n<tr><td>獨立專屬主機</td><td class=\"n\">✗</td><td class=\"n\">✗</td><td class=\"y\">✓</td></tr>\n<tr><td>ERP 深度串接</td><td class=\"n\">✗</td><td class=\"n\">✗</td><td class=\"y\">✓</td></tr>\n<tr><td>客製化開發</td><td class=\"n\">✗</td><td class=\"n\">✗</td><td class=\"y\">✓</td></tr>\n</tbody>\n</table>\n\n<h3 style=\"margin-top:40px\">常見問題</h3>\n<div style=\"background:#fafafa;border-radius:12px;padding:20px;margin:16px 0\">\n\n<div style=\"padding:12px 0;border-bottom:1px solid #eee\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：GoWarehouse 訂閱方案有哪幾種？怎麼選？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">GoWarehouse 提供三種方案：<strong>標準版</strong>（NT$12,000/月，適合品牌電商與小微企業）、<strong>專業版</strong>（NT$35,000/月，適合大型品牌與三方倉 3PL 業者，支援多貨主與自動化帳務）、<strong>企業版</strong>（專案議價，適合大型連鎖門市與跨國企業，提供客製化開發與 ERP 深度串接）。</p>\n</div>\n\n<div style=\"padding:12px 0;border-bottom:1px solid #eee\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：標準版跟專業版最關鍵的差別是什麼？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">關鍵差別在「<strong>多貨主管理</strong>」與「<strong>進階功能模組</strong>」。標準版適合單一貨主自用；專業版新增 30 貨主管理、自動化帳務、貨主後台、序號管理、行動 APP、加工單 BOM、安全庫存監控等，適合需要服務多個品牌貨主的三方倉業者。</p>\n</div>\n\n<div style=\"padding:12px 0;border-bottom:1px solid #eee\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：年繳比月繳划算多少？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">年繳優惠幅度約 29-45%。標準版年繳 NT$80,000（= 每天僅 NT$219，相當於月付 NT$6,667），專業版年繳 NT$300,000（= 每天僅 NT$822，相當於月付 NT$25,000）。</p>\n</div>\n\n<div style=\"padding:12px 0;border-bottom:1px solid #eee\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：超過月出貨量怎麼計費？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">超出部分按 NT$0.1/pc 計算。例如標準版月出貨量上限 10 萬件，若當月出貨 12 萬件，超出的 2 萬件另計 NT$2,000。企業版依合約另議。</p>\n</div>\n\n<div style=\"padding:12px 0;border-bottom:1px solid #eee\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：免費試用期間是完整功能還是受限？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">試用期間功能完整開放。標準版與專業版提供 7 天、企業版提供 30 天。試用結束後若未付費，帳號自動停用，資料保留 30 天供匯出。</p>\n</div>\n\n<div style=\"padding:12px 0;border-bottom:1px solid #eee\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：GoBot AI 點數是什麼？用完怎麼辦？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">GoBot 是 WMS 系統內建的 AI 助理（儲值制），用 token 量計費。標準版贈送 600 點、專業版贈送 2,500 點、企業版依合約。點數用完後可另行儲值購買，或搭配 Vanta × Claude 月費制整合作為進階 AI 能力補充。</p>\n</div>\n\n<div style=\"padding:12px 0\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：Vanta × Claude 是包含在方案裡的嗎？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">Vanta × Claude 採月費制訂閱（NT$99 / 月，另需使用者持有 Claude 訂閱），獨立於 GoBot 儲值制之外。企業版可議入合約內，其他方案以每月加購方式啟用。</p>\n</div>\n\n</div>\n", "children": []}, {"id": "news", "title": "最新動態", "html": "\n<h2>GoWarehouse 最新動態</h2>\n<p style=\"color:#555;line-height:1.8\">實體說明會、廠商合作、Vodcast 節目與產品更新都在這裡</p>\n\n<div style=\"margin:20px 0;padding:12px 0;border-bottom:1px solid #eee\">\n<button class=\"news-filter active\" data-type=\"all\">全部</button>\n<button class=\"news-filter\" data-type=\"event\">實體活動</button>\n<button class=\"news-filter\" data-type=\"partner\">廠商合作</button>\n<button class=\"news-filter\" data-type=\"vodcast\">Vodcast</button>\n</div>\n\n<h3 style=\"color:#000\">即將舉辦 / 進行中</h3>\n<div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:16px 0\">\n\n<div class=\"news-card\" data-type=\"event\">\n<span style=\"display:inline-block;background:#f0f0f0;color:#000;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600\">實體活動</span>\n<p style=\"font-size:12px;color:#888;margin:8px 0 4px 0\">2026 / 6 / 12（六）14:00-17:00</p>\n<h4 style=\"margin:6px 0;color:#000\">產業自動化轉型說明會</h4>\n<p style=\"font-size:13px;color:#555;line-height:1.8\">限額 20 組潛在客戶，現場演示如何導入標準化流程。現場訂閱即享 12+1 個月加碼優惠。適合日出貨量 50+ 件的品牌與三方倉業者。</p>\n<p style=\"font-size:12px;color:#666;margin:8px 0\">📍 台北市大安區忠孝東路四段 270 號 · 伊比薩辦公室</p>\n<p style=\"margin-top:12px\"><a href=\"https://line.me/R/ti/p/@gowarehouse\" target=\"_blank\" style=\"background:#000;color:#fff;padding:8px 16px;border-radius:4px;font-size:13px;font-weight:600;text-decoration:none;display:inline-block\">立即報名（LINE OA 諮詢）</a></p>\n</div>\n\n<div class=\"news-card\" data-type=\"partner\">\n<span style=\"display:inline-block;background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600\">廠商合作</span>\n<p style=\"font-size:12px;color:#888;margin:8px 0 4px 0\">已上線 · 持續生效</p>\n<h4 style=\"margin:6px 0;color:#000\">GoWarehouse × 賣貨便</h4>\n<p style=\"font-size:13px;color:#555;line-height:1.8\">全台 7-11 寄送服務深度整合，提供具競爭力的運費價格與自動化出貨流程。訂單成立後直接產出超商託運單，節省人工填寫。</p>\n<p style=\"margin-top:12px\"><a href=\"https://line.me/R/ti/p/@gowarehouse\" target=\"_blank\" style=\"background:#fff;color:#000;padding:8px 16px;border-radius:4px;font-size:13px;font-weight:600;border:1px solid #000;text-decoration:none;display:inline-block\">LINE OA 諮詢導入</a></p>\n</div>\n\n</div>\n\n<h3 style=\"color:#000;margin-top:32px\">Vodcast：什麼是 WMS？</h3>\n<p style=\"color:#555;line-height:1.8\">每週更新的倉儲數位化 Podcast，從 WMS 入門概念到產業實戰案例，陪你走一趟完整的倉儲轉型。</p>\n\n<div style=\"background:#f9f9f9;border-radius:8px;padding:20px;margin:16px 0\">\n<div style=\"display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:start\">\n\n<div style=\"aspect-ratio:16/9;background:#000;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:14px;padding:20px;text-align:center\">\n【YouTube 嵌入區】<br/>\n<span style=\"font-size:11px;color:#aaa;margin-top:8px\">實際上線時用 iframe 嵌入 GoWarehouse YouTube 頻道<br/>&lt;iframe src=\"https://www.youtube.com/embed/videoseries?list=PLAYLIST_ID\"&gt;<br/>建議用 playlist 格式，新集數自動同步</span>\n</div>\n\n<div>\n<p style=\"font-size:14px;font-weight:bold;color:#000;margin:0 0 8px 0\">最新集數</p>\n<div style=\"display:flex;flex-direction:column;gap:10px\">\n<div style=\"background:#fff;border:1px solid #eee;border-radius:4px;padding:10px;font-size:13px\">\n<strong>EP 1: 什麼是 WMS？</strong><br/>\n<span style=\"color:#888;font-size:11px\">倉儲管理系統的 7 幕結構入門</span>\n</div>\n<div style=\"background:#fff;border:1px solid #eee;border-radius:4px;padding:10px;font-size:13px;color:#888\">\n<strong>EP 2（籌備中）</strong><br/>\n<span style=\"font-size:11px\">ERP vs WMS：企業為什麼都需要？</span>\n</div>\n<div style=\"background:#fff;border:1px solid #eee;border-radius:4px;padding:10px;font-size:13px;color:#888\">\n<strong>EP 3（籌備中）</strong><br/>\n<span style=\"font-size:11px\">食品業 FEFO 效期管理實戰</span>\n</div>\n</div>\n<p style=\"margin-top:12px\"><a href=\"#\" style=\"color:#000;text-decoration:underline;font-size:13px;font-weight:600\">前往 YouTube 頻道 →</a></p>\n</div>\n\n</div>\n</div>\n\n<h3 style=\"color:#000;margin-top:32px\">過往活動存檔</h3>\n<p style=\"color:#888;font-size:13px;line-height:1.8\">（保留給未來累積已舉辦過的活動紀錄。上線初期可先空白或顯示「陸續更新中」）</p>\n\n<div style=\"background:#f9f9f9;border:1px dashed #ccc;border-radius:8px;padding:32px;text-align:center;color:#aaa;margin:16px 0\">\n陸續更新中 · 每場活動結束後將歸檔於此\n</div>\n", "children": []}, {"id": "about", "title": "關於我們", "html": "\n<h2>關於 IBIZA 伊比薩</h2>\n<p style=\"font-size:16px;color:#333;line-height:1.9;max-width:820px\"><strong>IBIZA 伊比薩股份有限公司</strong>是一家創立於 <strong>2016 年</strong>、總部位於 <strong>台灣台北</strong>的軟體公司，專注於電商生態系與倉儲技術。公司旗下兩大產品為：<strong>LiteShop 電商平台</strong>（服務品牌與中小賣家）與 <strong>GoWarehouse 倉儲管理系統</strong>（雲端 WMS，已通過 ISO/IEC 27001:2022 資訊安全管理系統認證）。IBIZA 核心團隊來自台灣科技業與倉儲實戰第一線，以「最懂電商的倉儲軟體、最懂倉庫實務的系統商」為雙核心定位，從接單到出貨一站式陪伴品牌與三方倉成長。</p>\n\n<div style=\"background:linear-gradient(135deg,#000 0%,#1a1a1a 100%);color:#fff;padding:48px 40px;border-radius:16px;margin:40px 0\">\n\n<p style=\"font-size:12px;color:#bbb;letter-spacing:3px;margin:0 0 12px 0\">FROM TAIWAN, FOR THE WORLD</p>\n<h3 style=\"font-size:30px;color:#fff;margin:0 0 12px 0;font-weight:700;border:none;padding:0\">從台灣出發，放眼國際</h3>\n<p style=\"font-size:15px;color:#ccc;line-height:1.9;margin:0 0 36px 0;max-width:720px\">以台灣倉儲產業的嚴謹要求為實戰基礎，以國際 WMS 產業標準為產品藍圖，服務在地市場的同時，為全球客戶提供平等體驗。</p>\n\n<div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:0 0 36px 0\">\n\n<div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:20px\">\n<p style=\"font-size:11px;color:#bbb;letter-spacing:2px;margin:0 0 10px 0\">在地實戰</p>\n<h4 style=\"color:#fff;font-size:16px;margin:0 0 10px 0\">台灣深耕</h4>\n<p style=\"font-size:13px;color:#bbb;line-height:1.8;margin:0\">食品冷鏈效期合規、3C 產品序號追蹤、跨平台大促瞬間爆單——以台灣倉儲產業最嚴謹的實戰場景淬煉系統。</p>\n</div>\n\n<div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:20px\">\n<p style=\"font-size:11px;color:#bbb;letter-spacing:2px;margin:0 0 10px 0\">國際標準</p>\n<h4 style=\"color:#fff;font-size:16px;margin:0 0 10px 0\">全球級技術背書</h4>\n<p style=\"font-size:13px;color:#bbb;line-height:1.8;margin:0\"><strong style=\"color:#fff\">ISO/IEC 27001:2022</strong> 資安認證 · <strong style=\"color:#fff\">Anthropic MCP Partner</strong> 官方整合 · <strong style=\"color:#fff\">Google Cloud Platform</strong> 雲端架構</p>\n</div>\n\n<div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:20px\">\n<p style=\"font-size:11px;color:#bbb;letter-spacing:2px;margin:0 0 10px 0\">多國語系</p>\n<h4 style=\"color:#fff;font-size:16px;margin:0 0 10px 0\">跨市場部署就緒</h4>\n<p style=\"font-size:13px;color:#bbb;line-height:1.8;margin:0\"><strong style=\"color:#fff\">繁中 · 簡中 · 英文 · 日文 · 東南亞主要語系</strong>——讓台灣企業順暢拓展海外，讓國際客戶平等使用同一系統。</p>\n</div>\n\n</div>\n\n<div style=\"border-top:1px solid rgba(255,255,255,0.2);padding-top:28px\">\n<p style=\"font-size:22px;color:#fff;font-weight:700;line-height:1.5;margin:0\">我們不只是台灣的 WMS——<br/>我們是從台灣出發、放眼全球的 WMS。</p>\n</div>\n\n</div>\n\n<h3 style=\"margin-top:40px\">我們的起點</h3>\n<p style=\"line-height:1.9;color:#333\">IBIZA 創辦於 2016 年，核心團隊來自台灣科技業與電商第一線。我們最早以 <strong>LiteShop 電商平台</strong> 切入市場，服務大量品牌與中小賣家。在這段過程中觀察到：電商真正的勝負不在前台的商品陳列，而在訂單爆量之後的倉儲與物流執行。</p>\n<p style=\"line-height:1.9;color:#333\"><strong>GoWarehouse</strong> 的起點，是一場與本土指標性三方倉業者的合作開發。我們用真實倉庫現場的場景去淬煉每一個模組，而不是從書桌上推導「理論正確」的系統。從那一刻起，GoWarehouse 正式成為 IBIZA 的第二條產品線。</p>\n\n<h3 style=\"margin-top:40px\">我們的雙核心定位</h3>\n<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0\">\n<div style=\"background:#fff;border:1px solid #e3e3e3;border-radius:12px;padding:20px\">\n<h4 style=\"margin:0 0 10px 0;color:#000\">最懂電商的倉儲軟體</h4>\n<p style=\"font-size:13px;color:#555;line-height:1.8;margin:0\">從 LiteShop 十年的電商平台經驗出發，我們深知賣家最頭痛的不是系統，而是訂單在「平台 → 庫存 → 物流」之間的斷點。GoWarehouse 把這些斷點一次補齊。</p>\n</div>\n<div style=\"background:#fff;border:1px solid #e3e3e3;border-radius:12px;padding:20px\">\n<h4 style=\"margin:0 0 10px 0;color:#000\">最懂倉庫實務的系統商</h4>\n<p style=\"font-size:13px;color:#555;line-height:1.8;margin:0\">核心團隊幾乎都來自倉儲第一線——代營運、三方倉、物流技術背景。系統裡每一個功能，都對應著倉庫現場曾經痛過的問題。</p>\n</div>\n</div>\n\n\n\n<h3 style=\"margin-top:40px\">核心團隊</h3>\n<p style=\"line-height:1.9;color:#333\">IBIZA 核心團隊橫跨科技業、電商代營運、以及倉儲物流產業。多位核心成員曾於業界擔任管理職位，帶著第一線倉儲運營與物流操作的實戰經驗加入——這也是 GoWarehouse 能做到「每一個模組都來自真實倉庫痛點」的原因。</p>\n<p style=\"line-height:1.9;color:#333\">我們相信：好的 SaaS 系統不是從空想誕生，而是從真實倉庫裡的每一個痛點裡長出來的。</p>\n<div style=\"background:#f5f5f5;border:1px dashed #ccc;border-radius:12px;padding:40px 20px;text-align:center;color:#999;margin:16px 0;min-height:180px;display:flex;align-items:center;justify-content:center;flex-direction:column\">\n<p style=\"font-size:14px;margin:0\">【團隊照片區塊】</p>\n<p style=\"font-size:12px;margin:8px 0 0 0\">建議呈現方式：創辦團隊合照（或個別大頭照 grid）+ 倉庫現場與辦公室工作情境</p>\n</div>\n\n<h3 style=\"margin-top:40px\">兩大產品並行</h3>\n<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0\">\n<div style=\"background:#fafafa;border:1px solid #e3e3e3;border-radius:12px;padding:20px\">\n<span style=\"display:inline-block;background:#000;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600\">電商平台</span>\n<h4 style=\"margin:10px 0 6px 0;color:#000;font-size:18px\">LiteShop</h4>\n<p style=\"font-size:13px;color:#555;line-height:1.8\">為台灣品牌與中小賣家打造的電商平台。從商品上架、訂單管理、金流物流串接，協助品牌快速開店與擴張。</p>\n</div>\n<div style=\"background:#fafafa;border:1px solid #e3e3e3;border-radius:12px;padding:20px\">\n<span style=\"display:inline-block;background:#000;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600\">倉儲管理</span>\n<h4 style=\"margin:10px 0 6px 0;color:#000;font-size:18px\">GoWarehouse</h4>\n<p style=\"font-size:13px;color:#555;line-height:1.8\">符合國際倉儲業 SOP 標準的雲端 WMS。服務 50+ 家企業倉庫，從日出貨 30 件的初創品牌到月出貨 30 萬件的三方倉都適用。</p>\n</div>\n</div>\n\n<h3 style=\"margin-top:40px\">里程碑</h3>\n<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0\">\n<div style=\"background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:16px;text-align:center\">\n<div style=\"font-size:24px;font-weight:bold;color:#000\">2016</div>\n<p style=\"font-size:12px;color:#666;margin:4px 0 0 0\">IBIZA 伊比薩成立</p>\n</div>\n<div style=\"background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:16px;text-align:center\">\n<div style=\"font-size:24px;font-weight:bold;color:#000\">10 年</div>\n<p style=\"font-size:12px;color:#666;margin:4px 0 0 0\">電商與倉儲技術累積</p>\n</div>\n<div style=\"background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:16px;text-align:center\">\n<div style=\"font-size:24px;font-weight:bold;color:#000\">50+</div>\n<p style=\"font-size:12px;color:#666;margin:4px 0 0 0\">企業倉庫夥伴</p>\n</div>\n<div style=\"background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:16px;text-align:center\">\n<div style=\"font-size:24px;font-weight:bold;color:#000\">ISO 27001</div>\n<p style=\"font-size:12px;color:#666;margin:4px 0 0 0\">資安管理國際認證</p>\n</div>\n</div>\n<div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:12px 0 16px 0\">\n<div style=\"background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:16px;text-align:center\">\n<div style=\"font-size:18px;font-weight:bold;color:#000\">Anthropic MCP Partner</div>\n<p style=\"font-size:12px;color:#666;margin:4px 0 0 0\">Vanta × Claude AI 官方整合夥伴</p>\n</div>\n<div style=\"background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:16px;text-align:center\">\n<div style=\"font-size:18px;font-weight:bold;color:#000\">Google Cloud Platform</div>\n<p style=\"font-size:12px;color:#666;margin:4px 0 0 0\">企業級雲端基礎架構</p>\n</div>\n</div>\n\n<h3 style=\"margin-top:40px\">常見問題</h3>\n<div style=\"background:#fafafa;border-radius:12px;padding:20px;margin:16px 0\">\n\n<div style=\"padding:12px 0;border-bottom:1px solid #eee\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：IBIZA 伊比薩是什麼公司？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">IBIZA 伊比薩股份有限公司是一家創立於 2016 年、總部位於台灣台北的軟體公司，專注於電商生態系與倉儲技術。旗下兩大產品為 LiteShop 電商平台與 GoWarehouse 倉儲管理系統。</p>\n</div>\n\n<div style=\"padding:12px 0;border-bottom:1px solid #eee\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：為什麼 GoWarehouse 說自己是「最懂電商的 WMS」？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">因為 IBIZA 在做 GoWarehouse 之前，已經透過 LiteShop 電商平台服務大量品牌與中小賣家 10 年，深刻理解訂單在「電商平台 → 庫存 → 物流」之間的斷點，GoWarehouse 就是為了補齊這些斷點而生。</p>\n</div>\n\n<div style=\"padding:12px 0;border-bottom:1px solid #eee\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：GoWarehouse 來自台灣嗎？支援國際市場嗎？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">GoWarehouse 由台灣 IBIZA 伊比薩研發與營運，以台灣倉儲產業的嚴謹品質要求（食品冷鏈、3C 序號、跨平台爆單）為實戰基礎。全系統支援多國語系（含繁體中文、簡體中文、英文、日文及東南亞主要語系），並符合國際 WMS 產業標準，適用於台灣企業拓展海外，也適用於國際客戶使用。</p>\n</div>\n\n<div style=\"padding:12px 0\">\n<p style=\"font-weight:bold;color:#000;margin:0 0 6px 0\">Q：GoWarehouse 有什麼國際認證或合作夥伴？</p>\n<p style=\"color:#555;line-height:1.8;margin:0\">GoWarehouse 已通過 ISO/IEC 27001:2022 資訊安全管理系統認證，伺服器託管於 Google Cloud Platform。AI 助理 Vanta × Claude 為 Anthropic MCP（Model Context Protocol）官方整合夥伴。</p let currentId=null;
function buildNav(){
const nav=document.getElementById('nav');
DATA.forEach(s=>{
if(s.children&&s.children.length){
const btn=document.createElement('button');
btn.className='nav-item has-children';
btn.textContent='▶ '+s.title;
btn.onclick=()=>{const wasOpen=btn.classList.contains('open');btn.classList.toggle('open');if(!wasOpen&&s.children.length)showSection(s.children[0].id)};
nav.appendChild(btn);
const cDiv=document.createElement('div');
cDiv.className='nav-child';
s.children.forEach(c=>{
const cb=document.createElement('button');
cb.className='nav-item';
cb.textContent=c.title;
cb.dataset.id=c.id;
cb.onclick=()=>showSection(c.id);
cDiv.appendChild(cb);
});
nav.appendChild(cDiv);
}else{
const btn=document.createElement('button');
btn.className='nav-item';
btn.textContent=s.title;
btn.dataset.id=s.id;
btn.onclick=()=>showSection(s.id);
nav.appendChild(btn);
}
});
}
function findSection(id){
for(const s of DATA){
if(s.id===id) return s;
if(s.children)for(const c of s.children)if(c.id===id)return c;
}
return null;
}
function showSection(id){
const s=findSection(id);
if(!s)return;
currentId=id;
document.getElementById('content').innerHTML=s.html;
document.querySelectorAll('.nav-item').forEach(b=>{
b.classList.toggle('active',b.dataset.id===id);
if(b.classList.contains('has-children')){
const next=b.nextElementSibling;
if(next){
const hasActive=next.querySelector('[data-id="'+id+'"]');
if(hasActive)b.classList.add('open');
}
}
});
window.scrollTo(0,0);
updateStats();
}
function toggleNext(el){
const next=el.nextElementSibling;
if(next&&next.classList.contains('collapsible')){
next.classList.toggle('open');
el.textContent=el.textContent.replace(/[▶▼]/,next.classList.contains('open')?'▼':'▶');
}
}
function scrollFeatCarousel(dx){
const c=document.getElementById('featCarousel');
if(c)c.scrollBy({left:dx,behavior:'smooth'});
}
function setFilter(mode){
document.body.className=mode==='all'?'':'filter-'+mode;
const btns=document.querySelectorAll('#filter-bar button');
btns.forEach(b=>b.classList.remove('active'));
const map={'all':0,'mod':1,'enh':2,'add':3};
if(map[mode]!==undefined)btns[map[mode]].classList.add('active');
}
function updateStats(){
const c=document.getElementById('content');
const mod=c.querySelectorAll('.modified,.modblock').length;
const enh=c.querySelectorAll('.enhanced').length;
const add=c.querySelectorAll('.added').length;
document.getElementById('stats').textContent='修改 '+mod+' / 強化 '+enh+' / 新增 '+add;
}
